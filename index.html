/* ---- Selling skills interactivity ---- */
function initSales(){
  const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  document.querySelectorAll('.sa-view .countup').forEach(el=>{
    const target = +el.dataset.target, suf = el.dataset.suffix||'';
    if(reduce){ el.textContent = target+suf; return; }
    const dur = 900, start = performance.now();
    const tick = now =>{ const p = Math.min((now-start)/dur,1); el.textContent = Math.round(p*target)+suf; if(p<1) requestAnimationFrame(tick); };
    requestAnimationFrame(tick);
  });
  setSubTab('sa','learn');
  window.__subTab = n => setSubTab('sa', n, true);
  document.querySelectorAll('#saSubtabs .subtab').forEach(b=> b.onclick=()=>setSubTab('sa', b.dataset.subtab));
  saStage(0);
  document.querySelectorAll('#saTrack .cj-node').forEach(n=> n.onclick = ()=>{ if(saTimer){clearInterval(saTimer);saTimer=null;} saStage(+n.dataset.i); });
  const play = document.getElementById('saPlay'); if(play) play.onclick = saPlay;
  objShow();
  scInit();
  warmVoices();
  const pbtn=document.getElementById('presentBtn'); if(pbtn) pbtn.onclick=presentSales;
}
let scFilter='All', scQuery='';
function scInit(){
  const tabs=document.getElementById('scTabs'); if(!tabs) return;
  scFilter='All'; scQuery='';
  tabs.innerHTML = SC_CATS.map(c=>`<button class="sc-tab ${c==='All'?'active':''}" data-c="${c}">${c}</button>`).join('');
  tabs.querySelectorAll('.sc-tab').forEach(b=> b.onclick=()=>{ scFilter=b.dataset.c; tabs.querySelectorAll('.sc-tab').forEach(x=>x.classList.toggle('active',x===b)); scRender(); });
  const search=document.getElementById('scSearch'); if(search) search.oninput=()=>{ scQuery=search.value.toLowerCase(); scRender(); };
  scRender();
}
function scRender(){
  const list=document.getElementById('scList'); if(!list) return;
  const items = SALES_SCRIPTS.filter(s=>{
    const okCat = scFilter==='All' || s.cat===scFilter;
    const okQ = !scQuery || (s.q+' '+s.a+' '+s.cat).toLowerCase().includes(scQuery);
    return okCat && okQ;
  });
  if(!items.length){ list.innerHTML = `<div class="sc-empty">No scripts match that search.</div>`; return; }
  list.innerHTML = items.map(s=>{
    const i = SALES_SCRIPTS.indexOf(s);
    return `<div class="sc-card" id="sc${i}">
      <button class="sc-q" onclick="scToggle(${i})"><span class="sc-cat">${s.cat}</span><span class="sc-qt">${s.q}</span><span class="sc-chev">▾</span></button>
      <div class="sc-a"><p>${s.a}</p><div class="sc-tip">🗝️ <b>Remember:</b> ${s.tip}</div></div>
    </div>`;
  }).join('');
}
function scToggle(i){ const c=document.getElementById('sc'+i); if(c) c.classList.toggle('open'); }
let saI = 0, saTimer = null;
function saStage(i){
  saI = i;
  document.querySelectorAll('#saTrack .cj-node').forEach((n,idx)=>{ n.classList.toggle('active', idx===i); n.classList.toggle('done', idx<i); });
  const fill = document.getElementById('saFill');
  if(fill) fill.style.width = (i/(SALES_STAGES.length-1)*100)+'%';
  const d = SALES_STAGES[i], det = document.getElementById('saDetail');
  if(det) det.innerHTML = `<span class="step-no">STAGE ${i+1} · ${d.t.toUpperCase()}</span><br>${d.d}`;
}
function saPlay(){
  if(saTimer) return;
  let i = 0; saStage(0);
  saTimer = setInterval(()=>{ i++; if(i>=SALES_STAGES.length){ clearInterval(saTimer); saTimer=null; return; } saStage(i); }, 1300);
}
let objN = 0, objBest = 0;
function objShow(){
  const box = document.getElementById('objSim'); if(!box) return;
  if(objN>=OBJECTIONS.length){
    box.innerHTML = `<div class="cq-q" style="margin:0">🎯 You picked the strongest response ${objBest} / ${OBJECTIONS.length} times. ${objBest===OBJECTIONS.length?"Excellent instincts!":"Re-run it and aim for the best line each time."} <button class="btn btn-ghost" style="margin-left:8px" onclick="objReset()">Try again</button></div>`;
    return;
  }
  const o = OBJECTIONS[objN];
  box.innerHTML = `
    <div class="cq-prog">Scenario ${objN+1} of ${OBJECTIONS.length}</div>
    <div class="obj-customer">${o.customer}</div>
    <div class="cq-opts">${o.options.map((op,idx)=>`<button class="cq-opt" data-i="${idx}">${op.t}</button>`).join('')}</div>
    <div id="objWhy"></div>`;
  box.querySelectorAll('.cq-opt').forEach(b=> b.onclick = ()=>objPick(+b.dataset.i));
}
function objPick(choice){
  const o = OBJECTIONS[objN];
  const cls = {best:'best', ok:'okk', avoid:'avoid'};
  const tag = {best:'BEST', ok:'OKAY', avoid:'AVOID'};
  document.querySelectorAll('#objSim .cq-opt').forEach((b,idx)=>{
    b.disabled = true;
    if(idx===choice) b.classList.add(cls[o.options[idx].v]);
    else if(o.options[idx].v==='best') b.classList.add('best');
  });
  if(o.options[choice].v==='best') objBest++;
  const picked = o.options[choice];
  document.getElementById('objWhy').innerHTML = `<div class="cq-why"><b>You picked: ${tag[picked.v]}.</b> ${picked.why}</div><div class="cq-foot"><span class="cq-prog">Best picks: ${objBest}/${OBJECTIONS.length}</span><button class="btn btn-primary" onclick="objNext()">Next →</button></div>`;
}
function objNext(){ objN++; objShow(); }
function objReset(){ objN = 0; objBest = 0; objShow(); }

let vf = {timing:null, party:null, online:null, markup:null};
function initVerify(){
  setSubTab('vf','learn');
  window.__subTab = n => setSubTab('vf', n, true);
  document.querySelectorAll('#vfSubtabs .subtab').forEach(b=> b.onclick=()=>setSubTab('vf', b.dataset.subtab));
  warmVoices();
  const pbtn = document.getElementById('presentBtn'); if(pbtn) pbtn.onclick = presentVerify;
  vfReset();
}
function vfReset(){ vf = {timing:null, party:null, online:null, markup:null}; vfRender(); }
function vfSet(k,v){ vf[k]=v; vfRender(); }
function vfAsk(box, q, opts, key){
  box.innerHTML = `
    <div class="vf-crumbs">${vfCrumbs()}</div>
    <div class="vf-q">${q}</div>
    <div class="vf-opts">${opts.map(o=>`<button class="vf-opt" data-k="${key}" data-v="${o[1]}">${o[0]}</button>`).join('')}</div>`;
  box.querySelectorAll('.vf-opt').forEach(b=> b.onclick = ()=>vfSet(b.dataset.k, b.dataset.v));
}
function vfCrumbs(){
  const map = {within:'Within 30 days', after:'After 30 days', first:'First-party', third:'Third-party', yes:'Verif. done', no:'No online verif.'};
  const parts = [];
  if(vf.timing) parts.push(map[vf.timing]);
  if(vf.party) parts.push(map[vf.party]);
  if(vf.online) parts.push(map[vf.online]);
  if(vf.markup) parts.push(vf.markup==='yes'?'Marked-up':'Normal fare');
  if(!parts.length) return '';
  return parts.map(p=>`<span class="vf-crumb">${p}</span>`).join('') + ` <button class="vf-restart" onclick="vfReset()">↺ start over</button>`;
}
function vfRender(){
  const box = document.getElementById('vfWizard'); if(!box) return;
  if(!vf.timing) return vfAsk(box, 'When is the travel date?', [['🗓️ Within 30 days','within'],['📆 After 30 days','after']], 'timing');
  if(!vf.party) return vfAsk(box, 'Whose card is paying?', [['First-party — the cardholder is the traveller','first'],['Third-party — booking for someone else','third']], 'party');
  if(!vf.online) return vfAsk(box, 'Was bank / online verification completed successfully?', [['✅ Yes, completed','yes'],['❌ No / could not','no']], 'online');
  if(vf.timing==='after' && vf.online==='yes' && !vf.markup) return vfAsk(box, 'Is the fare at a marked-up price?', [['Yes, marked up','yes'],['No / normal fare','no']], 'markup');
  vfShowResult(box);
}
function verifyRequirements(){
  const items = [];
  const APPROVE = 'Email acknowledgment from the cardholder — exact words "I approve this purchase" or "I approve"';
  if(vf.timing==='within'){
    if(vf.party==='third'){
      items.push(['Collect the cardholder\'s phone number and email','req']);
      items.push([APPROVE+' — mandatory','req']);
      items.push(['Charge verification — not specified for third-party here','no']);
    } else {
      if(vf.online==='yes'){
        items.push(['Bank/online verification','done']);
        items.push(['Charge verification — not required (verification completed)','no']);
        items.push(['Email acknowledgment — request it anyway as chargeback proof; proceed if given, may let go if refused','opt']);
      } else {
        items.push([APPROVE,'req']);
        items.push(['Charge verification','req']);
      }
    }
    items.push(['Reminder: within 30 days we always request an email acknowledgment (first- or third-party) for chargeback protection','note']);
  } else { // after 30 days
    if(vf.party==='third'){
      items.push(['Collect the cardholder\'s phone number and email','req']);
      items.push([APPROVE+' — this is sufficient for third-party','req']);
      items.push(['Charge verification — not required','no']);
      if(vf.online==='yes'){
        if(vf.markup==='yes') items.push(['Verbal confirmation — not required (marked-up price)','no']);
        else items.push(['Verbal confirmation from the cardholder (by phone)','req']);
      }
    } else { // first-party
      items.push(['Email acknowledgment — not required from the passenger','no']);
      if(vf.online==='yes'){
        items.push(['Charge verification — not required (online verification successful)','no']);
        if(vf.markup==='yes') items.push(['Verbal confirmation — not required (marked-up price)','no']);
        else items.push(['Verbal confirmation from the cardholder (by phone)','req']);
      } else {
        items.push(['First-party, after 30 days, without online verification isn\'t spelled out in the policy — check the written policy or your supervisor before proceeding','note']);
      }
    }
  }
  return items;
}
function vfShowResult(box){
  const items = verifyRequirements();
  const pill = {req:'<span class="vf-pill req">Required</span>', opt:'<span class="vf-pill opt">Request</span>', no:'<span class="vf-pill no">Not required</span>', done:'<span class="vf-pill done">Done ✓</span>'};
  const rows = items.map(it=>{
    if(it[1]==='note') return `<div class="vf-note">📌 ${it[0]}</div>`;
    return `<div class="vf-row">${pill[it[1]]||''}<span>${it[0]}</span></div>`;
  }).join('');
  box.innerHTML = `
    <div class="vf-crumbs">${vfCrumbs()}</div>
    <div class="vf-result-head">For this booking you need:</div>
    <div class="vf-result">${rows}</div>
    <div class="vf-always">✉️ Always email the <b>booking confirmation</b> and <b>ticket confirmation</b> (if issued) to the cardholder.</div>`;
}

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function viewExam(){
  if(!allModulesDone()){
    const done = MODULES.filter(m=>progress[m.id]>=100).length;
    return `<div class="ex-view"><h2 class="page-title">Final Exam</h2>
      <div class="ex-locked"><div class="ex-ico">🔒</div>
        <h3>Complete every module first</h3>
        <p>The final exam unlocks once you've passed the checkpoint in all ${MODULES.length} modules. You've completed <b>${done} of ${MODULES.length}</b> so far.</p>
        <button class="btn btn-primary" onclick="go('dash')">Back to modules</button>
      </div></div>`;
  }
  return `
  <div class="ex-view">
  <h2 class="page-title">Final Exam</h2>
  <p class="page-sub">${EXAM_N} questions drawn from across every module. Score <b>${EXAM_PASS}%</b> or higher to pass and unlock your certificate. You can retake it as often as you like.</p>
  <div id="examBox" class="ex-box"></div>
  </div>`;
}
function initExam(){ if(allModulesDone()) examStart(); }
function examStart(){
  if(examSession && examSession.qs && examSession.qs.length && examSession.i < examSession.qs.length){
    return examRenderResume();
  }
  exam.qs = shuffle(EXAM_POOL).slice(0, EXAM_N);
  exam.i = 0; exam.answers = [];
  examRenderIntro();
}
function examRenderResume(){
  const box=document.getElementById('examBox'); if(!box) return;
  const at=examSession.i+1, tot=examSession.qs.length;
  box.innerHTML = `
    <div class="ex-intro">
      <div class="ex-ico">⏸️</div>
      <h3>Welcome back${agentName?', '+agentName.split(/\\s+/)[0]:''}.</h3>
      <p>You have an exam in progress — you were on <b>question ${at} of ${tot}</b>. Pick up where you left off, or start fresh.</p>
      <div class="ex-actions">
        <button class="btn btn-primary" onclick="examResume()">Resume (question ${at}) →</button>
        <button class="btn btn-ghost" onclick="examFresh()">Start over</button>
      </div>
    </div>`;
}
function examResume(){
  exam.qs = examSession.qs; exam.i = examSession.i; exam.answers = examSession.answers||[];
  examRenderQ();
}
function examFresh(){
  examSession = null; persist();
  exam.qs = shuffle(EXAM_POOL).slice(0, EXAM_N); exam.i=0; exam.answers=[];
  examRenderIntro();
}
function examRenderIntro(){
  const box=document.getElementById('examBox'); if(!box) return;
  box.innerHTML = `
    <div class="ex-intro">
      <div class="ex-ico">📝</div>
      <h3>Ready when you are${agentName?', '+agentName.split(/\s+/)[0]:''}.</h3>
      <p>${EXAM_N} multiple-choice questions. No time limit — you can stop and resume anytime. Your best score is saved${examBest?` — currently <b>${examBest}%</b>`:''}.</p>
      <button class="btn btn-primary" onclick="examBegin()">Start the exam →</button>
    </div>`;
}
function examBegin(){
  exam.qs = shuffle(EXAM_POOL).slice(0, EXAM_N); exam.i=0; exam.answers=[];
  examSession = {qs:exam.qs, i:0, answers:[]}; persist();
  examRenderQ();
}
function examRenderQ(){
  const box=document.getElementById('examBox'); if(!box) return;
  if(exam.i>=exam.qs.length){ return examFinish(); }
  const q=exam.qs[exam.i];
  const pct=Math.round(exam.i/exam.qs.length*100);
  box.innerHTML = `
    <div class="ex-bar"><i style="width:${pct}%"></i></div>
    <div class="ex-meta">Question ${exam.i+1} of ${exam.qs.length} <span class="ex-tag">${q.m}</span></div>
    <div class="ex-q">${q.q}</div>
    <div class="ex-opts">${q.opts.map((o,idx)=>`<button class="ex-opt" onclick="examPick(${idx})">${o}</button>`).join('')}</div>`;
}
function examPick(idx){
  exam.answers[exam.i] = idx;
  exam.i++;
  examSession = {qs:exam.qs, i:exam.i, answers:exam.answers}; persist();
  examRenderQ();
}
function examFinish(){
  const correct = exam.qs.reduce((n,q,i)=> n + (exam.answers[i]===q.a?1:0), 0);
  const pct = Math.round(correct/exam.qs.length*100);
  const passed = pct>=EXAM_PASS;
  examBest = Math.max(examBest, pct);
  if(passed) examPassed = true;
  examSession = null;            // test complete — clear the resume point
  persist();
  // topic breakdown of misses
  const missed = {};
  exam.qs.forEach((q,i)=>{ if(exam.answers[i]!==q.a){ missed[q.m]=(missed[q.m]||0)+1; } });
  const missList = Object.keys(missed);
  const box=document.getElementById('examBox');
  box.innerHTML = `
    <div class="ex-result ${passed?'pass':'fail'}">
      <div class="ex-score">${pct}%</div>
      <div class="ex-verdict">${passed?'✓ Passed':'Not quite yet'}</div>
      <p>You got <b>${correct} of ${exam.qs.length}</b> correct. ${passed?'Great work — your certificate is unlocked.':`You need ${EXAM_PASS}% to pass. Review and try again — you've got this.`}</p>
      ${missList.length?`<div class="ex-review">Worth a review: ${missList.map(m=>`<span class="ex-tag">${m}</span>`).join(' ')}</div>`:''}
      <div class="ex-actions">
        <button class="btn btn-ghost" onclick="examBegin()">Retake exam</button>
        ${passed?`<button class="btn btn-primary" onclick="go('cert')">View your certificate →</button>`:`<button class="btn btn-primary" onclick="go('dash')">Back to modules</button>`}
      </div>
    </div>`;
  refreshNavState();
}

let rp = {node:"start", score:50, steps:0, good:0};

function viewRoleplay(){return `
  <div class="rp-view">
  <h2 class="page-title">Roleplay Call</h2>
  <p class="page-sub">A live customer call. Every choice changes what the customer says next — and how the call ends. Aim to keep their confidence high and close the booking honestly.</p>
  <div class="rp-meter-wrap"><span class="rp-meter-l">Customer confidence</span><div class="rp-meter"><i id="rpMeter" style="width:50%"></i></div></div>
  <div id="rpStage" class="rp-stage"></div>
  </div>`;
}
function initRoleplay(){ rp={node:"start", score:50, steps:0, good:0}; rpRender(); }
function rpMeterUpd(){ const m=document.getElementById('rpMeter'); if(m){ m.style.width=rp.score+'%'; m.className = rp.score>=66?'good':rp.score>=33?'mid':'low'; } }
function rpRender(){
  const stage=document.getElementById('rpStage'); if(!stage) return;
  rpMeterUpd();
  const n=CALL[rp.node];
  if(n.end){
    const emoji = n.end==='good'?'🎉':n.end==='ok'?'👍':'📉';
    stage.innerHTML = `
      <div class="rp-end ${n.end}">
        <div class="rp-end-emoji">${emoji}</div>
        <h3>${n.title}</h3>
        <p>${n.body}</p>
        <div class="rp-end-stat">You chose the strongest response <b>${rp.good}</b> of <b>${rp.steps}</b> times.</div>
        <button class="btn btn-primary" onclick="initRoleplay()">↺ Take the call again</button>
      </div>`;
    return;
  }
  stage.innerHTML = `
    <div class="rp-cust"><div class="rp-avatar">🧑</div><div class="rp-bubble">${n.cust}</div></div>
    <div class="rp-choices">${n.choices.map((c,i)=>`<button class="rp-choice" onclick="rpChoose(${i})">${c.t}</button>`).join('')}</div>`;
}
function rpChoose(i){
  const n=CALL[rp.node]; const c=n.choices[i];
  rp.steps++;
  if(c.q==='good'){ rp.score=Math.min(100,rp.score+18); rp.good++; }
  else if(c.q==='ok'){ rp.score=Math.min(100,rp.score+4); }
  else { rp.score=Math.max(0,rp.score-22); }
  rpMeterUpd();
  const cls = c.q==='good'?'good':c.q==='ok'?'okk':'avoid';
  const tag = c.q==='good'?'STRONG':c.q==='ok'?'OKAY':'WEAK';
  const stage=document.getElementById('rpStage');
  stage.innerHTML = `
    <div class="rp-cust"><div class="rp-avatar">🧑</div><div class="rp-bubble">${n.cust}</div></div>
    <div class="rp-you"><div class="rp-you-bubble ${cls}">${c.t}</div><div class="rp-avatar you">🎧</div></div>
    <div class="rp-fb ${cls}"><span class="rp-fb-tag ${cls}">${tag}</span> ${c.fb}</div>
    <button class="btn btn-primary rp-cont" onclick="rpNext('${c.to}')">Continue →</button>`;
}
function rpNext(to){ rp.node=to; rpRender(); const s=document.getElementById('rpStage'); if(s) s.scrollIntoView({behavior:'smooth',block:'nearest'}); }

function viewAdmin(){
  return `

function adminMsg(html){ const b=document.getElementById('adminBox'); if(b) b.innerHTML=html; }
function escHtml(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtTime(iso){ try{ return new Date(iso).toLocaleString(); }catch(e){ return ''; } }
let _adminSub=null;
function initAdmin(){
  const sb=getSB();
  if(!sb){
    adminMsg('<div class="placeholder"><b>Live sync isn\'t set up yet.</b><br>Add your Supabase URL and anon key near the top of the file (see the deploy guide), then reload. Until then, each agent\'s progress is saved only on their own device.</div>');

  }
  if(ADMIN_PASSCODE && sessionStorage.getItem('ctd_admin_ok')!=='1'){

    try{ sessionStorage.setItem('ctd_admin_ok','1'); }catch(e){}
  }
  adminLoad();
  try{
    if(_adminSub){ sb.removeChannel(_adminSub); }
    _adminSub = sb.channel('ctd_progress_live')
      .on('postgres_changes',{event:'*',schema:'public',table:'ctd_progress'},()=>adminLoad())
      .subscribe();
  }catch(e){}
}
async function adminLoad(){
  const sb=getSB(); if(!sb) return;
  try{
    const {data,error}=await sb.from('ctd_progress').select('*').order('updated_at',{ascending:false});
    if(error){ adminMsg('<div class="placeholder">Couldn\'t load data: '+escHtml(error.message)+'</div>'); return; }
    renderAdmin(data||[]);
  }catch(e){ adminMsg('<div class="placeholder">Network error loading data. Tap Refresh to retry.</div>'); }
}
let _adminRows=[];
function admProg(r){ let p=r.progress; if(typeof p==='string'){ try{p=JSON.parse(p);}catch(e){p={};} } return p||{}; }
function admDots(r){ const p=admProg(r); return `<span class="mdots">`+MODULES.map(m=>{ const v=p[m.id]||0; const cls=v>=100?'done':(v>0?'part':'none'); return `<span class="mdot ${cls}" title="${escHtml(m.title)}: ${v>=100?'done':(v>0?v+'%':'not started')}"></span>`; }).join('')+`</span>`; }
function csvCell(v){ v=String(v==null?'':v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }
function adminCSV(){
  const rows=_adminRows||[];
  const cols=['Agent','Modules done','Exam best %','Passed','Last active'].concat(MODULES.map(m=>m.title));
  const lines=[cols.map(csvCell).join(',')];
  rows.forEach(r=>{ const p=admProg(r);
    const base=[r.agent_name||'', (r.modules_done||0)+'/'+(r.modules_total||7), r.exam_best||'', r.exam_passed?'Yes':'No', fmtTime(r.updated_at)];
    const mods=MODULES.map(m=>(p[m.id]||0));
    lines.push(base.concat(mods).map(csvCell).join(','));
  });
  const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download='ctd-agent-progress-'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
function renderAdmin(rows){
  _adminRows=rows;
  const total=rows.length;
  const passed=rows.filter(r=>r.exam_passed).length;
  const finished=rows.filter(r=>(r.modules_done||0)>=(r.modules_total||7)).length;
  const attempted=rows.filter(r=>r.exam_best>0);
  const avg=attempted.length?Math.round(attempted.reduce((a,r)=>a+(r.exam_best||0),0)/attempted.length):0;
  const head=`<div class="admin-stats">
    <div class="admin-stat"><div class="n">${total}</div><div class="l">Agents</div></div>
    <div class="admin-stat"><div class="n">${finished}</div><div class="l">All modules done</div></div>
    <div class="admin-stat"><div class="n">${passed}</div><div class="l">Passed exam</div></div>
    <div class="admin-stat"><div class="n">${avg?avg+'%':'—'}</div><div class="l">Avg exam score</div></div>
    <div class="admin-stat"><div class="n live">● live</div><div class="l">Auto-updating</div></div>
  </div>`;
  const toolbar=`<div class="admin-toolbar">
    <div class="mdot-legend"><span class="mdot done"></span> done <span class="mdot part"></span> in progress <span class="mdot none"></span> not started</div>
    <div style="display:flex;gap:8px"><button class="btn btn-ghost" onclick="adminLoad()">Refresh</button><button class="btn btn-primary" onclick="adminCSV()">⬇ Export CSV</button></div>
  </div>`;
  if(!total){ adminMsg(head+'<div class="placeholder">No agents yet. As soon as someone opens the training on the live site and types their name, they\'ll show up here.</div>'); return; }
  const body=rows.map(r=>`
    <tr>
      <td><b>${escHtml(r.agent_name||'—')}</b></td>
      <td>${admDots(r)} <span class="muted" style="font-size:11px">${(r.modules_done||0)}/${(r.modules_total||7)}</span></td>
      <td>${r.exam_best?escHtml(r.exam_best)+'%':'—'}</td>
      <td>${r.exam_passed?'<span class="abadge pass">Passed</span>':'<span class="abadge">In progress</span>'}</td>
      <td class="muted">${fmtTime(r.updated_at)}</td>
    </tr>`).join('');
  adminMsg(head+toolbar+`<div class="admin-tablewrap"><table class="admin-table">
    <thead><tr><th>Agent</th><th>Module progress</th><th>Best exam</th><th>Status</th><th>Last active</th></tr></thead>
    <tbody>${body}</tbody></table></div>`);
}

/* ============================================================
   MODULE CHECKPOINTS — must pass to complete a module
   ============================================================ */
const MODULE_TAG = {company:"Company", leaves:"Leave", iata:"IATA", amadeus:"Amadeus", process:"Process", sales:"Sales", verify:"Verification", airlines:"Airlines"};
const GATE_N = 10, GATE_PASS = 90;
function allModulesDone(){ return MODULES.every(m=>progress[m.id]>=100); }
function nextModuleId(mid){ const i=MODULES.findIndex(m=>m.id===mid); return (i>=0&&i<MODULES.length-1)?MODULES[i+1].id:null; }
function moduleGateHTML(mid){ return `<h3 class="sec">Module checkpoint</h3><div id="gateBox" class="ex-box"></div>`; }
function gatePool(mid){ const t=MODULE_TAG[mid]; return EXAM_POOL.filter(q=>q.m===t); }
let gq=null;
function initModuleGate(mid){
  const box=document.getElementById('gateBox'); if(!box) return;
  if(mid==='iata') return iaxIntro(box);
  if(progress[mid]>=100){
    const nxt=nextModuleId(mid);
    box.innerHTML=`<div class="gate-result pass"><div class="gr-score">✓</div><h4>Checkpoint passed</h4><p>You've completed this module. Retake the checkpoint, or move on.</p><button class="btn btn-primary" onclick="gateStart('${mid}')">Retake checkpoint</button>${nxt?`<button class="btn btn-ghost" onclick="go('${nxt}')">Next module →</button>`:`<button class="btn btn-ghost" onclick="go('exam')">Final exam →</button>`}</div>`;
  } else {
    const n=Math.min(GATE_N, gatePool(mid).length);
    box.innerHTML=`<div class="gate-intro"><p><b>You must pass this checkpoint to complete the module and move on.</b> ${n} questions drawn from everything above — score <b>${GATE_PASS}%</b> or higher. Unlimited tries.</p><button class="btn btn-primary" onclick="gateStart('${mid}')">Start checkpoint →</button></div>`;
  }
}
function gateStart(mid){ const pool=gatePool(mid); gq={mid, qs:shuffle(pool).slice(0,Math.min(GATE_N,pool.length)), i:0, ans:[]}; gateRenderQ(); }
function gateRenderQ(){
  const box=document.getElementById('gateBox'); if(!box) return;
  if(gq.i>=gq.qs.length) return gateFinish();
  const q=gq.qs[gq.i]; const pct=Math.round(gq.i/gq.qs.length*100);
  box.innerHTML=`<div class="ex-bar"><i style="width:${pct}%"></i></div>
    <div class="ex-meta">Question ${gq.i+1} of ${gq.qs.length} <span class="ex-tag">${q.m}</span></div>
    <div class="ex-q">${q.q}</div>
    <div class="ex-opts">${q.opts.map((o,idx)=>`<button class="ex-opt" onclick="gatePick(${idx})">${escHtml(o)}</button>`).join('')}</div>`;
}
function gatePick(idx){ gq.ans[gq.i]=idx; gq.i++; gateRenderQ(); }
function gateFinish(){
  const correct=gq.qs.reduce((n,q,i)=>n+(gq.ans[i]===q.a?1:0),0);
  const pct=Math.round(correct/gq.qs.length*100), passed=pct>=GATE_PASS;
  if(passed && progress[gq.mid]<100){ progress[gq.mid]=100; persist(); refreshNavState(); }
  const nxt=nextModuleId(gq.mid), box=document.getElementById('gateBox'); if(!box) return;
  box.innerHTML=`<div class="gate-result ${passed?'pass':'fail'}"><div class="gr-score">${pct}%</div>
    <h4>${passed?'Checkpoint passed ✓':'Not yet — keep going'}</h4>

const IAX_N = 100, IAX_PASS = 85;
let iax=null;
function jsq(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function iaxAirports(){ const out=[]; Object.keys(IATA).forEach(rk=>{ (IATA[rk]||[]).forEach(a=>{ if(a.st && a.say && a.c) out.push(Object.assign({rk},a)); }); }); return out; }
function iaxIntro(box){
  if(progress.iata>=100){
    const nxt=nextModuleId('iata');
    box.innerHTML=`<div class="gate-result pass"><div class="gr-score">✓</div><h4>Airport test passed</h4><p>You've completed the IATA module. Retake the test, or move on.</p><button class="btn btn-primary" onclick="iaxStart()">Retake the ${IAX_N}-question test</button>${nxt?`<button class="btn btn-ghost" onclick="go('${nxt}')">Next module →</button>`:''}</div>`;
    return;
  }
  if(iaxSession && iaxSession.qs && iaxSession.qs.length && iaxSession.i < iaxSession.qs.length){
    const at=iaxSession.i+1, tot=iaxSession.qs.length;
    box.innerHTML=`<div class="gate-intro"><p><b>⏸️ You have the airport test in progress</b> — you were on airport <b>${at} of ${tot}</b> (score so far ${iaxSession.correct||0}). Pick up where you left off, or start fresh.</p><button class="btn btn-primary" onclick="iaxResume()">Resume (airport ${at}) →</button> <button class="btn btn-ghost" onclick="iaxFresh()">Start over</button></div>`;
    return;
  }
  box.innerHTML=`<div class="gate-intro"><p><b>Airport Test — ${IAX_N} questions. You must pass this to complete the module.</b><br>For each airport code you'll: <b>(1)</b> say the airport name out loud (tap 🎤 Say it to check yourself), and <b>(2)</b> choose its state / province / country. Score <b>${IAX_PASS}%</b> or higher. You can stop and resume anytime. Unlimited tries.</p><button class="btn btn-primary" onclick="iaxStart()">Start the airport test →</button></div>`;
}
function iaxResume(){
  iax={ qs:iaxSession.qs, i:iaxSession.i, correct:iaxSession.correct||0, answered:false };
  iaxRenderQ();
}
function iaxFresh(){ iaxSession=null; persist(); iaxStart(); }
function iaxOptions(item, pool){
  let same=[...new Set(pool.filter(x=>x.rk===item.rk && x.st!==item.st).map(x=>x.st))];
  let opts=shuffle(same).slice(0,3);
  if(opts.length<3){ const glob=[...new Set(pool.filter(x=>x.st!==item.st && opts.indexOf(x.st)<0).map(x=>x.st))]; opts=opts.concat(shuffle(glob).slice(0,3-opts.length)); }
  return shuffle([item.st, ...opts]);
}
function iaxStart(){
  const pool=iaxAirports(), n=Math.min(IAX_N, pool.length);
  iax={ qs: shuffle(pool).slice(0,n).map(a=>({a, opts:iaxOptions(a,pool)})), i:0, correct:0, answered:false };
  iaxRenderQ();
}
function iaxRenderQ(){
  const box=document.getElementById('gateBox'); if(!box) return;
  if(iax.i>=iax.qs.length) return iaxFinish();
  iaxSession = {qs:iax.qs, i:iax.i, correct:iax.correct}; persist();   // resume point
  const q=iax.qs[iax.i]; iax.answered=false;
  const pct=Math.round(iax.i/iax.qs.length*100);
  box.innerHTML=`<div class="ex-bar"><i style="width:${pct}%"></i></div>
    <div class="ex-meta">Airport ${iax.i+1} of ${iax.qs.length} · Score ${iax.correct}</div>
    <div class="iax-code">${q.a.c}</div>
    <div class="iax-step">Step 1 — say the airport name out loud</div>
    <div class="iax-say">
      <button class="mini listen" onclick="hearIt('${jsq(q.a.say)}','${q.a.c}')">🔊 Hear it</button>
      <button class="mini slow" onclick="hearItSlow(this,'${jsq(q.a.say)}','${q.a.c}')">🐢 Slow</button>
      <button class="mini test" onclick="iaxSayIt(this,'${jsq(q.a.say)}')">🎤 Say it</button>
    </div>
    <div id="iaxSayRes" style="font-size:12.5px;color:var(--muted);margin-top:7px;min-height:16px"></div>
    <div class="iax-step">Step 2 — which state / province / country is it in?</div>
    <div class="ex-opts">${q.opts.map(o=>`<button class="ex-opt" onclick="iaxPick(this,${o===q.a.st})">${escHtml(o)}</button>`).join('')}</div>
    <div id="iaxReveal"></div>`;
}
function iaxSayIt(btn, text){
  const res=document.getElementById('iaxSayRes');
  if(!SR){ if(res) res.textContent='🎤 Speech check needs Chrome or Edge — use 🔊 Hear it to learn the sound.'; return; }
  const rec=new SR(); rec.lang='en-US'; rec.interimResults=false; rec.maxAlternatives=6;
  if(res) res.textContent='🎙️ Listening…';
  try{ rec.start(); }catch(e){}
  rec.onresult=ev=>{ const alts=Array.from(ev.results[0]).map(r=>r.transcript); let best=0,h=alts[0]||''; alts.forEach(a=>{const s=matchScore(a,text); if(s>best){best=s;h=a;}}); const pct=Math.round(best*100);
    if(res) res.textContent = best>=0.82?`✅ Great — heard "${h.trim()}" (${pct}%)` : best>=0.55?`🟡 Close — heard "${h.trim()}" (${pct}%)` : `🔁 Heard "${h.trim()}" (${pct}%) — tap 🔊 and try again`; };
  rec.onerror=ev=>{ if(res) res.textContent = ev.error==='not-allowed'?'🔒 Allow mic access and retry.':'⚠️ Mic error — try again.'; };
}
function iaxPick(btn, correct){
  if(iax.answered) return; iax.answered=true;
  const q=iax.qs[iax.i];
  if(correct) iax.correct++;
  const box=document.getElementById('gateBox');
  box.querySelectorAll('.ex-opts .ex-opt').forEach(b=>{ b.style.pointerEvents='none'; if(b.textContent===q.a.st) b.classList.add('correct'); });
  if(!correct) btn.classList.add('wrong');
  const rev=document.getElementById('iaxReveal');
  rev.className='iax-reveal '+(correct?'ok':'no');
  const last=(iax.i+1>=iax.qs.length);
  rev.innerHTML=`${correct?'✅ Correct.':'❌ Not quite.'} <b>${q.a.c}</b> is <b>${escHtml(q.a.city)}</b> (${escHtml(q.a.air)}), in <b>${escHtml(q.a.st)}</b>.<div style="margin-top:10px"><button class="btn btn-primary" onclick="iaxNext()">${last?'See results →':'Next airport →'}</button></div>`;
}
function iaxNext(){ iax.i++; iaxRenderQ(); }
function iaxFinish(){
  const pct=Math.round(iax.correct/iax.qs.length*100), passed=pct>=IAX_PASS;
  iaxSession=null;               // test complete — clear the resume point
  if(passed && progress.iata<100){ progress.iata=100; persist(); refreshNavState(); } else { persist(); }
  const nxt=nextModuleId('iata'), box=document.getElementById('gateBox'); if(!box) return;
  box.innerHTML=`<div class="gate-result ${passed?'pass':'fail'}"><div class="gr-score">${pct}%</div>
    <h4>${passed?'Airport test passed ✓':'Not yet — keep practising'}</h4>
    <p>You located ${iax.correct} of ${iax.qs.length} airports correctly. ${passed?'The IATA module is now complete.':`You need ${IAX_PASS}% to pass. Review the codes above and try again.`}</p>
    ${passed?(nxt?`<button class="btn btn-primary" onclick="go('${nxt}')">Next module →</button>`:''):`<button class="btn btn-primary" onclick="iaxStart()">Try again</button>`}
    <button class="btn btn-ghost" onclick="go('dash')">Dashboard</button></div>`;
}

const GLOSSARY_TERMS = [

  <input id="glSearch" class="gl-search" placeholder="Search terms (e.g. PNR, chargeback, rapport)…" oninput="renderGlossary(this.value)" autocomplete="off">

function initGlossary(){ renderGlossary(''); }
const GL_TAGS={company:"Company",gds:"GDS",travel:"Travel",verify:"Verification",leave:"Leave",sales:"Sales"};
function renderGlossary(q){
  const list=document.getElementById('glList'), count=document.getElementById('glCount'); if(!list) return;
  q=(q||'').trim().toLowerCase();
  let items=GLOSSARY_TERMS.filter(x=> !q || x.t.toLowerCase().includes(q) || x.d.toLowerCase().includes(q));
  items=items.slice().sort((a,b)=>a.t.replace(/[^a-z]/gi,'').toLowerCase().localeCompare(b.t.replace(/[^a-z]/gi,'').toLowerCase()));
  if(count) count.textContent = items.length+' term'+(items.length===1?'':'s')+(q?` matching “${q}”`:'');
  if(!items.length){ list.innerHTML=`<div class="gl-empty">No terms match that — try a shorter word.</div>`; return; }
  const groups={};
  items.forEach(x=>{ const L=x.t.replace(/[^a-zA-Z]/g,'').charAt(0).toUpperCase(); (groups[L]=groups[L]||[]).push(x); });
  list.innerHTML = Object.keys(groups).sort().map(L=>`
    <div class="gl-group"><div class="gl-letter">${L}</div>
    ${groups[L].map(x=>`<div class="gl-item"><div class="gl-term">${escHtml(x.t)}<span class="gl-tag">${GL_TAGS[x.g]||''}</span></div><div class="gl-def">${x.d}</div></div>`).join('')}
    </div>`).join('');
}

function escAttr(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
const GROUPED_REGIONS = new Set(['us','ca','me','af','asia','camer','sa','carib','eu']);
function iataCardHTML(a){
  return `
    <div class="iata-card">
      <div class="ic-top">
        <div class="code">${a.c}</div>
        <div class="ic-name"><div class="city">${a.city} <span class="ic-flag">${a.flag}</span></div><div class="air">${a.air}</div></div>

        </div>
      </div>
      <div class="ic-result"></div>

function renderIata(){
  const q = (document.getElementById('iataSearch')?.value||'').trim().toLowerCase();
  let data = regionData();
  if(q) data = allIata().filter(a=>a.c.toLowerCase().includes(q)||a.city.toLowerCase().includes(q)||a.air.toLowerCase().includes(q));
  const grid = document.getElementById('iataGrid');
  if(!data.length){ grid.innerHTML = `<div class="placeholder" style="grid-column:1/-1">No match for "<b>${q}</b>". Try a 3-letter code or city name.</div>`; return; }
  if(!q && GROUPED_REGIONS.has(activeRegion)){
    const groups = {};
    data.forEach(a=>{ const g=a.st||'Other'; (groups[g]=groups[g]||[]).push(a); });
    const names = Object.keys(groups).sort((x,y)=>x.localeCompare(y));
    grid.innerHTML = names.map(n=>{
      const cards = groups[n].slice().sort((x,y)=>x.city.localeCompare(y.city)).map(iataCardHTML).join('');
      return `<h4 class="iata-grouphead">${n} <span>${groups[n].length}</span></h4>` + cards;
    }).join('');
  } else {
    grid.innerHTML = data.map(iataCardHTML).join('');
  }
  grid.querySelectorAll('.mini.listen').forEach(b=> b.onclick=()=>hearIt(b.dataset.say, b.dataset.code));
  grid.querySelectorAll('.mini.slow').forEach(b=> b.onclick=()=>hearItSlow(b, b.dataset.say, b.dataset.code));
  grid.querySelectorAll('.mini.test').forEach(b=> b.onclick=()=>sayIt(b, b.dataset.say));
}

/* Text-to-speech — prefer a clear, male American voice (with safe fallbacks per machine) */
function bestSayVoice(){
  const en = listEnglishVoices();
  const us = en.filter(v=>/en[-_]US/i.test(v.lang));
  const pool = us.length ? us : en;
  const find = re => pool.find(v=>re.test(v.name));
  return find(/microsoft (guy|andrew|brian|christopher|eric|davis|jason|tony|steffan|roger)\b.*natural/i) // Edge natural male (best)
      || find(/\b(guy|andrew|brian|christopher|eric|davis|jason|tony|steffan|roger)\b/i)                  // other natural male
      || find(/microsoft (david|mark)\b/i)                                                               // Windows desktop male (Chrome)
      || find(/\b(aaron|alex|reed|fred|tom|nathan)\b/i)                                                   // macOS male (Alex/Aaron are en-US)
      || pool.find(v=>isMaleName(v.name))                                                                 // any male-sounding US voice
      || find(/google us english/i)                                                                      // clear US fallback (not male)
      || us[0] || en[0] || null;
}
function ttsSpeak(text, rate, res){
  if(!('speechSynthesis' in window)){ if(!res) alert('Your browser does not support speech playback.'); return; }
  try{ window.speechSynthesis.getVoices(); }catch(e){}
  window.speechSynthesis.cancel();
  const spaced = rate<0.7 ? (text||'').replace(/\s+/g,', ') : text;   // pauses between words when slow
  const u = new SpeechSynthesisUtterance(spaced);
  u.lang='en-US'; u.rate=rate; u.pitch=1; u.volume=1;
  const v = bestSayVoice(); if(v) u.voice=v;
  if(res){ u.onend=()=>{ res.className='ic-result'; res.textContent=''; }; u.onerror=u.onend; }
  window.speechSynthesis.speak(u);
}
function playClip(url, rate, onclear){
  return new Promise((resolve,reject)=>{
    try{
      const a = new Audio(url); a.playbackRate = rate||1;
      a.onended=()=>{ if(onclear) onclear(); resolve(true); };
      a.onerror=()=>reject(new Error('clip'));
      a.play().catch(()=>reject(new Error('play')));
    }catch(e){ reject(e); }
  });
}
function hearIt(text, code){
  if(IATA_AUDIO_BASE && code){ playClip(IATA_AUDIO_BASE+code+'.mp3', 1, null).catch(()=>ttsSpeak(text,0.9,null)); return; }
  ttsSpeak(text, 0.9, null);
}
function hearItSlow(btn, text, code){
  const card = btn.closest('.iata-card');
  const res = card ? card.querySelector('.ic-result') : null;
  if(res){ res.className='ic-result show listening'; res.textContent='🐢 Playing slowly — listen to each part…'; }

  if(IATA_AUDIO_BASE && code){ playClip(IATA_AUDIO_BASE+code+'.mp3', 0.6, clear).catch(()=>ttsSpeak(text,0.5,res)); return; }

}

/* Speech recognition pronunciation test — listens carefully and scores the match */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
function norm(s){
  return (s||'').toLowerCase()
    .replace(/[^a-z\s]/g,' ')
    .replace(/\b(airport|international|intl|regional|national|municipal|the|city|saint|st)\b/g,' ')
    .replace(/\s+/g,' ').trim();
}
function lev(a,b){
  const m=a.length, n=b.length; if(!m) return n; if(!n) return m;
  let prev=Array.from({length:n+1},(_,j)=>j), cur=new Array(n+1);
  for(let i=1;i<=m;i++){
    cur[0]=i;
    for(let j=1;j<=n;j++){
      const c=a[i-1]===b[j-1]?0:1;
      cur[j]=Math.min(prev[j]+1, cur[j-1]+1, prev[j-1]+c);
    }
    [prev,cur]=[cur,prev];
  }
  return prev[n];
}
function simRatio(a,b){ if(!a||!b) return 0; return 1 - lev(a,b)/Math.max(a.length,b.length); }
function matchScore(heard, target){
  const h=norm(heard), t=norm(target);
  if(!h||!t) return 0;
  const s1=simRatio(h,t);
  const s2=simRatio(h.replace(/\s/g,''), t.replace(/\s/g,''));
  const ht=h.split(' '), tt=t.split(' ');
  const allWordsHit = tt.length && tt.every(w=> ht.some(x=> simRatio(x,w)>=0.8));
  return Math.max(s1, s2, allWordsHit?0.9:0);
}
function sayIt(btn, expected){
  const card = btn.closest('.iata-card');
  const res = card.querySelector('.ic-result');
  if(!SR){
    res.className='ic-result show near';
    res.textContent='🎤 The speech test needs Chrome or Edge. You can still use "Hear it" to learn the sound.';
    return;
  }
  const rec = new SR();
  rec.lang='en-US'; rec.interimResults=false; rec.maxAlternatives=6; rec.continuous=false;
  res.className='ic-result show listening';
  res.textContent='🎙️ Listening… say "'+expected+'" clearly';
  try{ rec.start(); }catch(e){}
  rec.onresult=ev=>{
    const alts = Array.from(ev.results[0]).map(r=>r.transcript);
    let best=0, bestHeard=alts[0]||'';
    alts.forEach(a=>{ const s=matchScore(a, expected); if(s>best){ best=s; bestHeard=a; } });
    const pct=Math.round(best*100);
    const heardTxt=(bestHeard||'').trim();
    if(best>=0.82){ res.className='ic-result show pass'; res.textContent='✅ Spot on — heard "'+heardTxt+'" ('+pct+'% match)'; }
    else if(best>=0.55){ res.className='ic-result show near'; res.textContent='🟡 Close — heard "'+heardTxt+'" ('+pct+'%). Tap 🔊, then try once more.'; }
    else { res.className='ic-result show fail'; res.textContent='🔁 Heard "'+heardTxt+'" ('+pct+'%). Tap 🔊 to hear it, then try again.'; }
  };
  rec.onerror=ev=>{
    res.className='ic-result show fail';
    res.textContent = ev.error==='not-allowed' ? '🔒 Microphone blocked. Allow mic access and retry.'
      : (ev.error==='no-speech' ? '🔇 Didn\'t catch that — tap 🎤 and speak clearly.'
      : '⚠️ Mic error ('+ev.error+'). Try again.');
  };
}

/* ---- Command anatomy: render a command as labelled chunks ---- */
function anatomyHTML(anat){
  const parts = anat.parts || anat;
  return `<div class="anatomy">${parts.map(p=>`<div class="apart"><span class="apart-t">${p[0]}</span><span class="apart-l">${p[1]}</span></div>`).join('<span class="apart-plus">+</span>')}</div>`;
}

/* ---- Live booking simulator: watch mode + try mode ---- */
let simStep = 0;
let simMode = 'idle';        // idle | demo | try
let demoCancel = false;
let demoRunning = false;
const sleep = ms => new Promise(r=>setTimeout(r, ms));

function initSim(){
  simStep = 0; simMode = 'idle'; demoCancel = true; demoRunning = false;
  const inp = document.getElementById('simInput');
  if(inp){ inp.readOnly = true; inp.disabled = false; inp.value = ''; }
  resetSimScreen(`<div class="sim-line sys">AMADEUS TRAINING TERMINAL — practice booking</div><div class="sim-line sys">Choose below: watch it done once, or jump in and try.</div>`);
  document.getElementById('simTask').innerHTML = `<div class="sim-say" style="margin:0">👇 Pick an option to begin. Brand new? <b>Watch me do it first</b> is the gentle way in.</div>`;
  renderSimProg();
  renderModebar();
  if(inp){ inp.onkeydown = e=>{ if(e.key==='Enter') checkSim(); }; }
  document.getElementById('simReset').onclick = ()=>{ if(simMode==='demo'){ demoCancel = true; } initSim(); };
}
function resetSimScreen(html){
  const screen = document.getElementById('simScreen');
  if(screen) screen.innerHTML = html || '';
}
function renderModebar(){
  const bar = document.getElementById('simModebar');
  if(!bar) return;
  if(simMode==='demo'){
    bar.innerHTML = `<span class="mode-label playing">● Watching the demo…</span><button class="mode-btn" onclick="stopDemo()">⏹ Stop &amp; try it myself</button>`;
  } else if(simMode==='try'){
    bar.innerHTML = `<span class="mode-label">✋ Your turn — type each command shown.</span><button class="mode-btn ghost" onclick="startDemo()">▶ Watch the demo again</button>`;
  } else {
    bar.innerHTML = `<span class="mode-label">New to this? Watch it done once, then have a go.</span><button class="mode-btn primary" onclick="startDemo()">▶ Watch me do it first</button><button class="mode-btn ghost" onclick="startTry()">✋ I'll try it myself</button>`;
  }
}
function renderSimProg(){
  const total = SIM_SCENARIO.steps.length;
  const el = document.getElementById('simProg'); if(el) el.textContent = `${Math.min(simStep,total)} / ${total}`;
}
function renderSimTask(){
  const t = document.getElementById('simTask');
  if(!t) return;
  renderSimProg();
  if(simStep>=SIM_SCENARIO.steps.length){
    t.innerHTML = `<span class="sim-done">✓ All done — booking complete!</span>`;
    return;
  }
  const s = SIM_SCENARIO.steps[simStep];
  const typeRow = simMode==='demo'
    ? `<div class="sim-typethis sim-watching">⌨️ watch it type…</div>`
    : `<div class="sim-typethis">Type this: <code>${s.hint}</code> <button class="sim-fill" onclick="fillSim()">tap to fill it in</button></div>`;
  t.innerHTML = `
    <div class="sim-say"><span class="sim-step-tag">STEP ${simStep+1}</span> ${s.say}</div>
    ${anatomyHTML(s.parts)}
    ${typeRow}`;
}
function simAppend(html, cls){
  const screen = document.getElementById('simScreen');
  const div = document.createElement('div');
  div.className = 'sim-line '+(cls||'');
  div.innerHTML = html;
  screen.appendChild(div);
  screen.scrollTop = screen.scrollHeight;
}
function simOutput(step){
  simAppend(step.out.split('\n').map((l,i)=> i===0?`<span class="ok">&gt; ${escapeHtml(l)}</span>`:escapeHtml(l)).join('<br>'), 'result');
}

/* --- try mode --- */
function startTry(){
  demoCancel = true; demoRunning = false;
  simMode = 'try'; simStep = 0;
  resetSimScreen(`<div class="sim-line sys">Your turn! Type the command shown under the screen, then press Enter.</div>`);
  const inp = document.getElementById('simInput');
  inp.readOnly = false; inp.disabled = false; inp.value = '';
  renderSimTask(); renderModebar(); inp.focus();
}
function checkSim(){
  if(simMode!=='try') return;
  const inp = document.getElementById('simInput');
  const raw = inp.value.trim();
  if(!raw) return;
  const norm = raw.toUpperCase().replace(/\s+/g,' ').trim();
  const step = SIM_SCENARIO.steps[simStep];
  if(step.accept.test(norm) || step.accept.test(norm.replace(/\s+/g,''))){
    simOutput(step);
    simStep++;
    inp.value='';
    if(simStep>=SIM_SCENARIO.steps.length){ simAppend(SIM_SCENARIO.done, 'finish'); inp.disabled = true; }
    renderSimTask();
  } else {
    simAppend(`<span class="err">&gt; ${escapeHtml(raw)}</span><br>Not quite — copy the command shown in <b>"Type this"</b> below, or tap "tap to fill it in".`, 'result err-line');
    inp.value='';
    inp.focus();
  }
}
function fillSim(){ const i=document.getElementById('simInput'); if(i){ i.value = SIM_SCENARIO.steps[simStep].hint; i.focus(); } }

/* --- watch (demo) mode --- */
function startDemo(){
  if(demoRunning) return;
  demoCancel = false; demoRunning = true;
  simMode = 'demo'; simStep = 0;
  const inp = document.getElementById('simInput');
  inp.readOnly = true; inp.disabled = false; inp.value = '';
  resetSimScreen(`<div class="sim-line sys">▶ Demo — sit back and watch one booking from start to finish.</div>`);
  renderModebar();
  runDemo();
}
function stopDemo(){ demoCancel = true; demoRunning = false; startTry(); }
async function runDemo(){
  const inp = document.getElementById('simInput');
  for(let i=0; i<SIM_SCENARIO.steps.length; i++){
    if(demoCancel) return;
    simStep = i;
    renderSimTask();
    await sleep(900); if(demoCancel) return;
    inp.value = '';
    const cmd = SIM_SCENARIO.steps[i].hint;
    for(const ch of cmd){ if(demoCancel) return; inp.value += ch; await sleep(48); }
    await sleep(420); if(demoCancel) return;
    simOutput(SIM_SCENARIO.steps[i]);
    inp.value = '';
    await sleep(950);
  }
  if(demoCancel) return;
  simStep = SIM_SCENARIO.steps.length;
  renderSimProg();
  simAppend(SIM_SCENARIO.done, 'finish');
  demoRunning = false;
  document.getElementById('simTask').innerHTML = `<div class="sim-say" style="margin:0">👏 That's the whole booking. Ready to do it yourself?</div><div style="margin-top:10px"><button class="mode-btn primary" onclick="startTry()">✋ Now I'll try it</button></div>`;
  document.getElementById('simModebar').innerHTML = `<span class="mode-label">Demo finished.</span><button class="mode-btn ghost" onclick="startDemo()">▶ Watch again</button>`;
}
function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function initDrill(){ drillIdx = 0; renderDrill(); }
function renderDrill(){
  const box = document.getElementById('drillBox');
  if(!box) return;
  if(drillIdx>=DRILLS.length){
    box.innerHTML = `<div class="task" style="margin:0">🎉 <b>Drill complete.</b> You worked through all ${DRILLS.length} entries — that's a full search-to-PNR flow. <button class="btn btn-ghost" style="margin-left:8px" onclick="initDrill()">Restart drill</button></div>`;
    return;
  }
  const d = DRILLS[drillIdx];
  box.innerHTML = `
    <div class="task"><span class="tag">${drillIdx+1} / ${DRILLS.length}</span> &nbsp; ${d.task}</div>
    <input id="drillInput" placeholder="Type the Amadeus entry…" autocomplete="off" autocapitalize="characters" spellcheck="false">
    <div class="drill-res" id="drillRes"></div>`;
  const inp = document.getElementById('drillInput');
  inp.focus();
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') checkDrill(); });
}
function normCmd(s){ return s.toUpperCase().replace(/\s+/g,'').trim(); }
function checkDrill(){
  const inp = document.getElementById('drillInput');
  const res = document.getElementById('drillRes');
  const got = normCmd(inp.value);
  const want = normCmd(DRILLS[drillIdx].ans);
  if(got===want){
    res.innerHTML = `<span style="color:var(--go);font-weight:600">✅ Correct.</span> Loading next…`;
    drillIdx++;
    setTimeout(renderDrill, 700);
  } else {
    res.innerHTML = `<span style="color:var(--warn);font-weight:600">Not quite.</span> Expected <code style="font-family:var(--mono);background:rgba(14,27,44,.06);padding:2px 6px;border-radius:4px">${DRILLS[drillIdx].ans}</code> — check the reference above. <button class="btn btn-ghost" style="margin-left:8px;padding:5px 12px" onclick="drillIdx++;renderDrill()">Skip →</button>`;
  }
}

function checkSandbox(){
  const inp=document.getElementById('sbInput'), res=document.getElementById('sbRes'); if(!inp) return;
  const got=normCmd(inp.value); const t=sbTasks[sbI];
  if(t.accept.test(got)){
    sbScore++;
    res.innerHTML=`<span style="color:var(--go);font-weight:600">✅ Spot on.</span> Loading next…`;
    sbI++; setTimeout(renderSandbox,700);
  } else {
    res.innerHTML=`<span style="color:var(--warn);font-weight:600">Not yet.</span> Hint: ${t.hint} <button class="btn btn-ghost" style="margin-left:8px;padding:5px 12px" onclick="sbReveal()">Show answer</button>`;
  }
}
function sbReveal(){
  const res=document.getElementById('sbRes'); const t=sbTasks[sbI];
  res.innerHTML=`Answer: <code style="font-family:var(--mono);background:rgba(14,27,44,.06);padding:2px 6px;border-radius:4px">${t.sample}</code> <button class="btn btn-ghost" style="margin-left:8px;padding:5px 12px" onclick="sbI++;renderSandbox()">Next →</button>`;
}

}
function printCheat(){
  const rows = CHEAT.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('');
  const w = window.open('','_blank','width=720,height=900');
  if(!w){ alert('Please allow pop-ups to print the cheat sheet.'); return; }

    '<style>body{font-family:Arial,Helvetica,sans-serif;padding:26px;color:#111}'+
    'h1{font-size:18px;margin:0 0 4px}p{color:#555;font-size:12px;margin:0 0 16px}'+
    'table{width:100%;border-collapse:collapse;font-size:13px}'+
    'td{border:1px solid #ccc;padding:7px 9px;vertical-align:top}'+
    'td:first-child{font-family:Consolas,monospace;white-space:nowrap;width:40%;font-weight:bold}'+
    '</style></head><body><h1>Amadeus — everyday commands</h1>'+

    '<table>'+rows+'</table>'+

  w.document.close();
}

let ldemoToken = 0;
function _sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
async function playLessonDemo(i){
  const L = AMADEUS_LESSONS[i]; const steps = L && LESSON_DEMOS[L.id];
  const screen = document.getElementById('ldemoScreen-'+i);
  if(!steps || !screen) return;
  const btn = document.getElementById('ldemoBtn-'+i);
  const myToken = ++ldemoToken;
  const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  screen.textContent = ''; if(btn) btn.textContent = '■ Playing…';
  const put = t => { screen.textContent += t; screen.scrollTop = screen.scrollHeight; };
  for(const step of steps){
    if(myToken !== ldemoToken) return;
    if(step.cmd){
      put('> ');
      if(reduce){ put(step.cmd); }
      else { for(const ch of step.cmd){ if(myToken!==ldemoToken) return; put(ch); await _sleep(40); } }
      put('\n'); await _sleep(reduce?0:300);
    }
    if(step.out){ put(step.out + '\n\n'); }
    await _sleep(reduce?0:700);
  }
  if(myToken !== ldemoToken) return;
  put('> ▌');
  if(btn) btn.textContent = '↺ Replay demo';
}
