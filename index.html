<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTD Academy — Agent Training Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0E1B2C;        /* cockpit night */
    --navy-2:#15263B;      /* panel */
    --navy-3:#1E3350;      /* hover panel */
    --amber:#F0A500;       /* departure board */
    --amber-soft:#E8A23D;
    --go:#2FB37E;          /* runway clear */
    --go-soft:#3FC78F;
    --warn:#E8693D;        /* attention */
    --paper:#F3F6FA;       /* light slate bg */
    --card:#FFFFFF;
    --line:#D8E0E9;
    --ink:#0E1B2C;
    --muted:#5C6B7E;
    --muted-2:#8895A6;
    --radius:14px;
    --shadow:0 1px 2px rgba(14,27,44,.04), 0 5px 14px rgba(14,27,44,.05);
    --shadow-lg:0 4px 10px rgba(14,27,44,.06), 0 22px 50px rgba(14,27,44,.13);
    --radius-lg:18px;
    --mono:'IBM Plex Mono', ui-monospace, monospace;
    --disp:'Space Grotesk', system-ui, sans-serif;
    --body:'Inter', system-ui, sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:var(--body);color:var(--ink);
    background:radial-gradient(1100px 460px at 100% -8%, rgba(240,165,0,.06), transparent 62%), var(--paper);
    -webkit-font-smoothing:antialiased;line-height:1.55;
  }
  ::-webkit-scrollbar{width:11px;height:11px}
  ::-webkit-scrollbar-thumb{background:#c4d0dd;border-radius:8px;border:3px solid transparent;background-clip:content-box}
  ::-webkit-scrollbar-thumb:hover{background:#a9b8c8;background-clip:content-box}
  .app{display:grid;grid-template-columns:264px 1fr;min-height:100vh}

  /* ---------- Sidebar ---------- */
  .side{
    background:linear-gradient(177deg,#101f33 0%, #0a1525 100%);color:#cdd8e6;display:flex;flex-direction:column;
    position:sticky;top:0;height:100vh;box-shadow:inset -1px 0 0 rgba(255,255,255,.05);
  }
  .brand{padding:22px 22px 18px;display:flex;align-items:center;gap:11px;border-bottom:1px solid rgba(255,255,255,.08)}
  .brand .mark{
    width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,var(--amber),var(--amber-soft));
    display:grid;place-items:center;color:var(--navy);font-family:var(--disp);font-weight:700;font-size:18px;
    box-shadow:0 0 0 1px rgba(240,165,0,.4), 0 6px 14px rgba(240,165,0,.25);
  }
  .brand h1{font-family:var(--disp);font-size:16px;font-weight:600;color:#fff;letter-spacing:.2px;line-height:1.15}
  .brand span{font-size:11px;color:var(--muted-2);letter-spacing:.5px;text-transform:uppercase}
  nav{padding:14px 12px;flex:1;overflow-y:auto}
  .nav-label{font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted-2);padding:10px 12px 6px}
  .nav-item{
    display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;cursor:pointer;
    font-size:13.5px;color:#bccadb;transition:.15s;margin-bottom:2px;position:relative;
  }
  .nav-item:hover{background:var(--navy-2);color:#fff}
  .nav-item.active{background:var(--navy-3);color:#fff}
  .nav-item.active::before{content:"";position:absolute;left:-12px;top:8px;bottom:8px;width:3px;background:var(--amber);border-radius:0 3px 3px 0}
  .nav-num{font-family:var(--mono);font-size:11px;color:var(--amber);min-width:18px}
  .nav-ico{font-size:15px;width:18px;text-align:center}
  .nav-check{margin-left:auto;font-size:11px;color:var(--go-soft);opacity:0}
  .nav-item.done .nav-check{opacity:1}
  .side-foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:var(--muted-2)}
  .side-foot b{color:#cdd8e6;font-weight:600}

  /* ---------- Main ---------- */
  .main{min-width:0}
  .topbar{
    background:rgba(255,255,255,.82);backdrop-filter:saturate(1.4) blur(10px);border-bottom:1px solid var(--line);padding:15px 34px;
    display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;
  }
  .crumb{font-size:12.5px;color:var(--muted)}
  .crumb b{color:var(--ink)}
  .topbar-right{display:flex;align-items:center;gap:14px}
  .pill{font-size:12px;font-weight:600;background:rgba(240,165,0,.1);border:1px solid rgba(240,165,0,.28);padding:5px 12px;border-radius:20px;color:#8a5b00}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--navy);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:600}
  .content{padding:34px;max-width:1080px}
  .view{display:none}
  .view.active{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  h2.page-title{font-family:var(--disp);font-size:30px;font-weight:600;letter-spacing:-.5px;margin-bottom:6px;line-height:1.08}
  .page-sub{color:var(--muted);font-size:14.5px;margin-bottom:26px;max-width:620px}
  h3.sec{font-family:var(--disp);font-size:15px;font-weight:600;letter-spacing:.2px;color:#1c2b3d;margin:40px 0 16px;display:flex;align-items:center;gap:10px}
  h3.sec::before{content:"";width:18px;height:2px;background:var(--amber);border-radius:2px;flex:none}

  /* dashboard */
  .hero{
    background:linear-gradient(135deg,#14263d 0%, #0E1B2C 58%);border-radius:var(--radius-lg);padding:34px 34px;color:#fff;position:relative;overflow:hidden;margin-bottom:26px;
    box-shadow:0 18px 44px rgba(14,27,44,.28);border-top:1px solid rgba(240,165,0,.25);
  }
  .hero::before{content:"";position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,rgba(255,255,255,.025) 0 1px,transparent 1px 22px);pointer-events:none}
  .hero::after{content:"";position:absolute;right:-50px;top:-50px;width:280px;height:280px;
    background:radial-gradient(circle,rgba(240,165,0,.16),transparent 70%)}
  .hero > *{position:relative}
  .hero .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--amber);text-transform:uppercase}
  .hero h2{font-family:var(--disp);font-size:33px;font-weight:600;margin:10px 0 9px;letter-spacing:-.6px;line-height:1.1;max-width:640px}
  .hero p{color:#aebccd;font-size:14.5px;max-width:520px}
  .hero-stats{display:flex;gap:30px;margin-top:22px;flex-wrap:wrap}
  .hero-stat .n{font-family:var(--mono);font-size:24px;color:var(--amber);font-weight:600}
  .hero-stat .l{font-size:11.5px;color:#8fa0b3;letter-spacing:.4px;text-transform:uppercase}
  .hero-ring{position:absolute;top:30px;right:34px;width:96px;height:96px;border-radius:50%;display:grid;place-items:center;text-align:center;
    background:conic-gradient(var(--amber) calc(var(--p,0)*1%), rgba(255,255,255,.12) 0);}
  .hero-ring::before{content:"";position:absolute;inset:7px;border-radius:50%;background:#0E1B2C}
  .hero-ring span{position:relative;font-family:var(--disp);font-weight:600;font-size:20px;color:#fff;line-height:1}
  .hero-ring small{position:relative;display:block;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#8fa0b3;margin-top:2px}
  @media(max-width:640px){.hero-ring{display:none}}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}
  .mcard{
    background:var(--card);border:1px solid var(--line);border-radius:16px;padding:21px;cursor:pointer;
    transition:transform .2s cubic-bezier(.2,.7,.3,1), box-shadow .2s, border-color .2s;box-shadow:var(--shadow);position:relative;overflow:hidden;
  }
  .mcard::before{content:"";position:absolute;left:0;top:0;height:3px;width:100%;background:linear-gradient(90deg,var(--amber),var(--amber-soft));transform:scaleX(0);transform-origin:left;transition:transform .25s}
  .mcard:hover{transform:translateY(-4px);border-color:transparent;box-shadow:var(--shadow-lg)}
  .mcard:hover::before{transform:scaleX(1)}
  .mcard .mc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
  .mc-ico{width:44px;height:44px;border-radius:12px;background:linear-gradient(140deg,#eef3f8,#dfe8f1);display:grid;place-items:center;font-size:20px;box-shadow:inset 0 0 0 1px rgba(14,27,44,.05)}
  .mc-num{font-family:var(--mono);font-size:12px;color:var(--muted-2)}
  .mcard h4{font-family:var(--disp);font-size:15.5px;font-weight:600;margin-bottom:5px}
  .mcard p{font-size:12.8px;color:var(--muted);line-height:1.5;min-height:36px}
  .prog{height:5px;background:#e7edf3;border-radius:6px;margin-top:16px;overflow:hidden}
  .prog > i{display:block;height:100%;background:linear-gradient(90deg,var(--go),var(--go-soft));border-radius:6px;transition:.5s}
  .mc-foot{display:flex;justify-content:space-between;align-items:center;margin-top:9px;font-size:11.5px;color:var(--muted-2)}
  .badge-done{color:var(--go);font-weight:600}

  /* generic content blocks */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow);margin-bottom:18px}
  .panel p{font-size:14px;color:#33414f;margin-bottom:10px}
  .placeholder{
    border:1.5px dashed #c2cedb;border-radius:var(--radius);padding:26px;background:#fbfdff;color:var(--muted);
    font-size:13.5px;margin-bottom:16px;
  }
  .placeholder b{color:var(--ink);font-family:var(--disp)}
  .video-slot{
    aspect-ratio:16/9;background:linear-gradient(135deg,#16273c,#0E1B2C);border-radius:12px;display:grid;place-items:center;
    color:#7d8da0;margin-bottom:16px;border:1px solid var(--line);position:relative;overflow:hidden;
  }
  .video-slot .play{width:62px;height:62px;border-radius:50%;background:rgba(240,165,0,.95);display:grid;place-items:center;color:var(--navy);font-size:22px;box-shadow:0 8px 24px rgba(0,0,0,.3)}
  .video-slot .vlabel{position:absolute;bottom:14px;left:16px;color:#aebccd;font-size:12px;font-family:var(--mono)}
  .checklist{list-style:none}
  .checklist li{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
  .checklist li:last-child{border:0}
  .checklist .box{width:18px;height:18px;border:1.5px solid #c2cedb;border-radius:5px;flex-shrink:0;margin-top:1px}
  .tag{display:inline-block;font-size:11px;font-family:var(--mono);background:rgba(240,165,0,.13);color:#9a6b00;padding:2px 8px;border-radius:5px;border:1px solid rgba(240,165,0,.3)}
  .tag.go{background:rgba(43,90,138,.1);color:var(--navy);border-color:rgba(43,90,138,.28)}
  .tag.warn{background:rgba(232,105,61,.12);color:#b3461f;border-color:rgba(232,105,61,.3)}

  .btn{
    font-family:var(--body);font-size:13.5px;font-weight:600;padding:10px 18px;border-radius:9px;border:0;cursor:pointer;
    transition:.15s;display:inline-flex;align-items:center;gap:7px;
  }
  .btn-primary{background:linear-gradient(180deg,#1d3454,#13243a);color:#fff;box-shadow:0 2px 8px rgba(14,27,44,.2)}
  .btn-primary:hover{background:linear-gradient(180deg,#244067,#16293f);transform:translateY(-1px);box-shadow:0 5px 14px rgba(14,27,44,.26)}
  .btn-go{background:var(--go);color:#fff}
  .btn-go:hover{background:var(--go-soft)}
  .btn-ghost{background:var(--paper);color:var(--ink);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:#b9c6d6}
  .complete-row{display:flex;align-items:center;gap:12px;margin-top:24px;padding-top:20px;border-top:1px solid var(--line)}

  /* ---------- IATA module (signature: departure board) ---------- */
  .board-hero{
    background:#0a1422;border-radius:16px;padding:22px 24px;margin-bottom:22px;border:1px solid #1d2c41;
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;
  }
  .board-hero .bh-l h3{font-family:var(--mono);color:var(--amber);font-size:13px;letter-spacing:3px;margin-bottom:6px}
  .board-hero .bh-l p{color:#8fa0b3;font-size:13px;max-width:380px}
  .flip-clock{font-family:var(--mono);font-size:13px;color:#5e7186;letter-spacing:1px}
  .flip-clock span{background:#16273c;color:var(--amber);padding:5px 8px;border-radius:5px;margin-left:4px}

  .iata-controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
  .search{flex:1;min-width:200px;position:relative}
  .search input{
    width:100%;padding:11px 14px 11px 38px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:var(--body);background:var(--card);
  }
  .search input:focus{outline:0;border-color:var(--amber);box-shadow:0 0 0 3px rgba(240,165,0,.15)}
  .search .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted-2)}
  .region-tabs{display:flex;gap:6px;flex-wrap:wrap}
  .rtab{font-size:12.5px;padding:8px 13px;border-radius:8px;border:1px solid var(--line);background:var(--card);cursor:pointer;color:var(--muted);transition:.15s;font-weight:500}
  .rtab:hover{border-color:#b9c6d6}
  .rtab.active{background:var(--navy);color:#fff;border-color:var(--navy)}

  .iata-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:13px}
  .iata-grouphead{grid-column:1/-1;display:flex;align-items:center;gap:9px;margin:18px 0 2px;font-family:var(--disp);font-size:13px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:#1c2b3d}
  .iata-grouphead::before{content:"";width:16px;height:2px;background:var(--amber);border-radius:2px}
  .iata-grouphead span{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--muted);text-transform:none;letter-spacing:0}
  .iata-grouphead:first-child{margin-top:0}
  .iata-card{
    background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 16px;box-shadow:var(--shadow);transition:.15s;
  }
  .iata-card:hover{border-color:#b9c6d6}
  .ic-top{display:flex;align-items:center;gap:12px;margin-bottom:9px}
  .code{
    font-family:var(--mono);font-weight:600;font-size:22px;letter-spacing:2px;color:#fff;background:#0a1422;
    padding:7px 12px;border-radius:8px;border:1px solid #1d2c41;box-shadow:inset 0 0 0 1px rgba(240,165,0,.12);
  }
  .ic-name{flex:1;min-width:0}
  .ic-name .city{font-family:var(--disp);font-size:14.5px;font-weight:600;line-height:1.2}
  .ic-name .air{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ic-flag{font-size:18px}
  .ic-actions{display:flex;gap:8px}
  .ic-actions-col{display:flex;flex-direction:column;gap:8px;margin-top:6px}
  .mini{
    font-size:12px;font-weight:500;padding:7px 11px;border-radius:8px;border:1px solid var(--line);background:var(--paper);cursor:pointer;
    display:flex;align-items:center;gap:6px;transition:.15s;flex:1;justify-content:center;color:var(--ink);
  }
  .mini:hover{border-color:#b9c6d6}
  .mini.listen:hover{background:rgba(240,165,0,.1);border-color:var(--amber)}
  .mini.slow:hover{background:rgba(240,165,0,.08);border-color:var(--amber)}
  .mini.test:hover{background:rgba(47,179,126,.1);border-color:var(--go)}
  .mini .ph{font-family:var(--mono);font-size:10.5px;color:var(--muted-2);margin-left:2px}
  .ic-result{font-size:12px;margin-top:9px;min-height:0;border-radius:7px;transition:.2s;padding:0 0}
  .ic-result.show{padding:8px 10px;margin-top:9px}
  .ic-result.pass{background:rgba(47,179,126,.1);color:#1c7a52}
  .ic-result.near{background:rgba(240,165,0,.12);color:#8a5b00}
  .ic-result.fail{background:rgba(232,105,61,.1);color:#b3461f}
  .ic-result.listening{background:#0a1422;color:var(--amber)}

  /* ---------- Amadeus module ---------- */
  .term{
    background:#0a1422;border-radius:12px;padding:18px 20px;font-family:var(--mono);font-size:13px;color:#cdd8e6;margin-bottom:18px;
    border:1px solid #1d2c41;line-height:1.7;
  }
  .term .prompt{color:var(--go-soft)}
  .term .cmd{color:var(--amber)}
  .term .cmt{color:#5e7186}
  .cmd-table{width:100%;border-collapse:collapse;background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow)}
  .cmd-table th{background:var(--navy);color:#cdd8e6;font-size:11px;letter-spacing:.6px;text-transform:uppercase;text-align:left;padding:11px 14px;font-weight:600}
  .cmd-table td{padding:11px 14px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:top}
  .cmd-table tr:last-child td{border:0}
  .cmd-table tr:hover td{background:#fbfdff}
  .cmd-table code{font-family:var(--mono);font-size:12.5px;background:rgba(14,27,44,.06);padding:3px 7px;border-radius:5px;color:var(--navy);font-weight:500;white-space:nowrap}
  .cmd-table .desc{color:#33414f}

  /* drill */
  .drill{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px;box-shadow:var(--shadow);margin-top:8px}
  .drill .task{font-size:14px;margin-bottom:12px}
  .drill .task b{font-family:var(--disp)}
  .drill input{width:100%;padding:12px 14px;font-family:var(--mono);font-size:14px;border:1px solid var(--line);border-radius:9px;text-transform:uppercase}
  .drill input:focus{outline:0;border-color:var(--amber);box-shadow:0 0 0 3px rgba(240,165,0,.15)}
  .drill-res{margin-top:11px;font-size:13px;min-height:20px}

  /* ---- Amadeus lessons ---- */
  .lesson-scope{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .ls-step{font-size:11.5px;font-family:var(--mono);padding:5px 11px;border-radius:20px;letter-spacing:.3px}
  .ls-step.done{background:rgba(47,179,126,.12);color:#1c7a52;border:1px solid rgba(47,179,126,.3)}
  .ls-step.off{background:var(--paper);color:var(--muted-2);border:1px dashed var(--line)}
  .ls-arrow{color:var(--muted-2);font-size:12px}
  .lesson-tabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:6px;margin-bottom:16px;scrollbar-width:thin}
  .ltab{
    flex:0 0 auto;font-family:var(--body);font-size:12.8px;font-weight:500;padding:9px 13px;border-radius:10px;
    border:1px solid var(--line);background:var(--card);cursor:pointer;color:var(--muted);transition:.15s;white-space:nowrap;display:flex;align-items:center;gap:6px;
  }
  .ltab:hover{border-color:#b9c6d6;color:var(--ink)}
  .ltab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .ltab .ltn{font-family:var(--mono);font-size:11px;color:var(--amber)}
  .lesson-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}
  .lc-head{display:flex;gap:15px;align-items:flex-start;margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--line)}
  .lc-ico{width:48px;height:48px;border-radius:12px;background:var(--paper);display:grid;place-items:center;font-size:23px;flex-shrink:0}
  .lc-num{font-family:var(--mono);font-size:11px;color:var(--muted-2);letter-spacing:1px;text-transform:uppercase}
  .lc-title{font-family:var(--disp);font-size:19px;font-weight:600;margin:2px 0 4px}
  .lc-sub{font-size:13.5px;color:var(--muted)}
  .lc-block{margin-bottom:15px}
  .lc-block h4{font-family:var(--disp);font-size:13.5px;font-weight:600;margin-bottom:4px;color:var(--navy)}
  .lc-block p{font-size:14px;color:#33414f;line-height:1.6}
  .lc-block code, .lc-body code{font-family:var(--mono);font-size:12.5px;background:rgba(14,27,44,.06);padding:2px 6px;border-radius:5px;color:var(--navy);font-weight:500}
  .lc-term-label,.lck-label{font-family:var(--mono);font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted-2);margin:18px 0 8px}
  .lc-tip{font-size:13px;color:#5a4a1f;background:rgba(240,165,0,.1);border:1px solid rgba(240,165,0,.28);border-radius:10px;padding:11px 14px;margin-top:6px}
  .lc-keys{margin-top:6px}
  .lesson-nav{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:16px 0 8px}

  /* command anatomy — labelled chunks */
  .anatomy{display:flex;flex-wrap:wrap;align-items:flex-end;gap:6px;background:#0a1422;border:1px solid #1d2c41;border-radius:12px;padding:16px;margin-bottom:14px}
  .apart{display:flex;flex-direction:column;align-items:center;gap:5px}
  .apart-t{font-family:var(--mono);font-size:16px;font-weight:600;color:#fff;background:#16273c;border:1px solid #2a3e57;border-radius:7px;padding:6px 10px;letter-spacing:.5px}
  .apart-l{font-size:10.5px;color:var(--amber);text-align:center;max-width:88px;line-height:1.3}
  .apart-plus{color:#3d536e;font-size:15px;font-weight:600;padding-bottom:22px}

  /* jargon glossary */
  .jargon{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:18px;box-shadow:var(--shadow);overflow:hidden}
  .jargon summary{cursor:pointer;padding:13px 16px;font-family:var(--disp);font-size:13.5px;font-weight:600;color:var(--navy);list-style:none;user-select:none}
  .jargon summary::-webkit-details-marker{display:none}
  .jargon[open] summary{border-bottom:1px solid var(--line)}
  .jargon-grid{padding:8px 16px 14px}
  .jg-row{display:flex;gap:14px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
  .jg-row:last-child{border:0}
  .jg-term{flex:0 0 130px;font-family:var(--mono);font-weight:600;color:var(--navy);font-size:12.5px}
  .jg-def{color:#33414f}

  /* form-of-payment grid */
  .fop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin-top:4px}
  .fop-cell{background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:9px 11px;display:flex;flex-direction:column;gap:3px}
  .fop-name{font-size:11.5px;color:var(--muted);font-weight:600}
  .fop-cell code{font-family:var(--mono);font-size:12px;color:var(--navy)}

  /* ---- simulator ---- */
  .sim-intro{font-size:13.5px;color:#33414f;background:rgba(47,179,126,.07);border:1px solid rgba(47,179,126,.25);border-radius:10px;padding:12px 14px;margin-bottom:12px}
  .sim-modebar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  .sim-modebar .mode-label{font-size:13px;color:var(--muted);margin-right:auto}
  .sim-modebar .mode-label.playing{color:var(--go);font-weight:600;animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
  .mode-btn{font-family:var(--body);font-size:13px;font-weight:600;padding:9px 15px;border-radius:9px;border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;transition:.15s}
  .mode-btn:hover{border-color:#b9c6d6}
  .mode-btn.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
  .mode-btn.primary:hover{background:var(--navy-3)}
  .mode-btn.ghost{background:var(--paper)}
  .sim-watching{color:var(--amber)!important;font-style:italic}
  .sim{background:#0a1422;border:1px solid #1d2c41;border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
  .sim-bar{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#0e1b2c;border-bottom:1px solid #1d2c41}
  .sim-dots{display:flex;gap:6px}
  .sim-dots .d{width:11px;height:11px;border-radius:50%}
  .sim-dots .red{background:#ff5f57}.sim-dots .amber{background:#febc2e}.sim-dots .green{background:#28c840}
  .sim-title{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;color:#5e7186}
  .sim-prog{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--amber);background:#16273c;padding:3px 9px;border-radius:6px}
  .sim-screen{font-family:var(--mono);font-size:12.5px;line-height:1.65;color:#cdd8e6;padding:16px;height:240px;overflow-y:auto;white-space:pre-wrap}
  .sim-line{margin-bottom:6px}
  .sim-line.sys{color:#5e7186}
  .sim-line.result{background:rgba(255,255,255,.02);border-left:2px solid #1d2c41;padding:6px 10px;border-radius:0 6px 6px 0;margin:8px 0}
  .sim-line .ok{color:var(--go-soft)}
  .sim-line .err{color:#ff7a66}
  .sim-line.err-line{border-left-color:#b3461f}
  .sim-line.finish{color:var(--amber);background:rgba(240,165,0,.08);border-left:2px solid var(--amber);padding:10px 12px;border-radius:0 8px 8px 0;font-family:var(--body);font-size:14px;line-height:1.5}
  .sim-task{padding:14px 16px;background:#0e1b2c;border-top:1px solid #1d2c41}
  .sim-say{color:#dce6f2;font-size:14px;margin-bottom:12px}
  .sim-task .anatomy{margin-bottom:12px}
  .sim-step-tag{font-family:var(--mono);font-size:10.5px;letter-spacing:1px;color:var(--navy);background:var(--amber);padding:2px 7px;border-radius:5px;margin-right:8px}
  .sim-typethis{font-size:13px;color:#8fa0b3;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .sim-typethis code{font-family:var(--mono);font-size:14px;color:#fff;background:#16273c;border:1px solid #2a3e57;padding:5px 10px;border-radius:7px;letter-spacing:.5px}
  .sim-fill{background:transparent;border:1px solid #2a3e57;color:var(--amber);font-size:11.5px;padding:5px 10px;border-radius:7px;cursor:pointer;font-family:var(--body)}
  .sim-fill:hover{border-color:var(--amber)}
  .sim-done{color:var(--go-soft);font-weight:600;font-size:14px}
  .sim-input-row{display:flex;align-items:center;gap:8px;padding:12px 14px;background:#0a1422;border-top:1px solid #1d2c41}
  .sim-caret{font-family:var(--mono);color:var(--go-soft);font-size:15px}
  .sim-input-row input{flex:1;background:#0e1b2c;border:1px solid #1d2c41;border-radius:8px;padding:9px 12px;font-family:var(--mono);font-size:13.5px;color:#fff;text-transform:uppercase}
  .sim-input-row input:focus{outline:0;border-color:var(--amber)}
  .sim-input-row input:disabled{opacity:.5}
  .sim-input-row .btn{color:#cdd8e6;background:#16273c;border-color:#1d2c41}
  .sim-input-row .btn:hover{border-color:var(--amber)}

  .note{font-size:12.5px;color:var(--muted);background:rgba(232,105,61,.07);border:1px solid rgba(232,105,61,.25);border-radius:10px;padding:12px 14px;margin-bottom:16px;display:flex;gap:9px}
  .note b{color:#b3461f;font-family:var(--disp)}

  .platforms{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:6px}
  .plat{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:16px;text-align:center;box-shadow:var(--shadow)}
  .plat .pn{font-family:var(--disp);font-weight:600;font-size:14px}
  .plat .pd{font-size:11.5px;color:var(--muted);margin-top:3px}

  @media (max-width:860px){
    .app{grid-template-columns:1fr}
    .side{position:fixed;left:-264px;z-index:50;transition:.25s;width:264px}
    .side.open{left:0}
    .content{padding:20px}
    .menu-btn{display:grid !important}
  }
  .menu-btn{display:none;width:36px;height:36px;border-radius:8px;background:var(--paper);border:1px solid var(--line);place-items:center;cursor:pointer;font-size:16px}

  /* ===== Company intro (interactive + animated) ===== */
  .co-hero{background:var(--navy);border-radius:18px;padding:28px 30px;color:#fff;position:relative;overflow:hidden;margin-bottom:28px}
  .co-hero::after{content:"";position:absolute;right:-30px;top:-30px;width:220px;height:220px;background:radial-gradient(circle,rgba(240,165,0,.12),transparent 70%)}
  .co-hero .plane{position:absolute;right:26px;top:22px;font-size:30px;animation:fly 6s ease-in-out infinite}
  @keyframes fly{0%,100%{transform:translate(0,0) rotate(0)}50%{transform:translate(-12px,-7px) rotate(-6deg)}}
  .co-hero h3{font-family:var(--disp);font-size:23px;font-weight:600;margin-bottom:6px;position:relative}
  .co-hero p{color:#aebccd;font-size:14px;max-width:560px;position:relative}
  .co-stats{display:flex;gap:28px;flex-wrap:wrap;margin-top:20px;position:relative}
  .co-stat .n{font-family:var(--mono);font-size:26px;color:var(--amber);font-weight:600}
  .co-stat .l{font-size:11px;color:#8fa0b3;letter-spacing:.4px;text-transform:uppercase}

  .reveal{opacity:0;transform:translateY(12px);transition:opacity .5s ease, transform .5s ease}
  .reveal.in{opacity:1;transform:none}

  .cj{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;box-shadow:var(--shadow);margin-bottom:18px}
  .cj-track{position:relative;display:flex;justify-content:space-between;margin:6px 0 18px}
  .cj-line{position:absolute;left:24px;right:24px;top:19px;height:3px;background:var(--paper);border-radius:3px}
  .cj-line > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--go),var(--go-soft));border-radius:3px;transition:width .5s ease}
  .cj-node{position:relative;z-index:1;background:none;border:0;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;padding:0}
  .cj-dot{width:40px;height:40px;border-radius:50%;background:var(--paper);border:2px solid var(--line);display:grid;place-items:center;font-size:18px;transition:.25s}
  .cj-node.active .cj-dot,.cj-node.done .cj-dot{background:var(--navy);border-color:var(--navy);transform:scale(1.08)}
  .cj-lbl{font-size:10.5px;color:var(--muted);text-align:center;max-width:82px;line-height:1.25}
  .cj-node.active .cj-lbl{color:var(--navy);font-weight:600}
  .cj-detail{background:var(--paper);border-radius:10px;padding:15px 16px;font-size:14px;color:#33414f;min-height:50px;animation:fade .35s ease;line-height:1.55}
  .cj-detail .step-no{font-family:var(--mono);font-size:11px;color:#9a6b00;letter-spacing:1px}

  .flip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:14px;margin-bottom:6px}
  .flip{perspective:1000px;height:152px;cursor:pointer}
  .flip-inner{position:relative;width:100%;height:100%;transition:transform .55s;transform-style:preserve-3d}
  .flip.flipped .flip-inner{transform:rotateY(180deg)}
  .flip-face{position:absolute;inset:0;-webkit-backface-visibility:hidden;backface-visibility:hidden;border-radius:13px;border:1px solid var(--line);padding:18px;display:flex;flex-direction:column;justify-content:center;box-shadow:var(--shadow)}
  .flip-face.front{background:var(--card)}
  .flip-face.back{background:var(--navy);color:#dfe7f0;transform:rotateY(180deg);font-size:13px;line-height:1.55}
  .fc-ico{font-size:26px;margin-bottom:9px}
  .flip-face.front h4{font-family:var(--disp);font-size:15px;font-weight:600}
  .fc-hint{position:absolute;bottom:10px;right:12px;font-size:9.5px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.5px}

  .mk-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .mk-tab{font-size:13px;padding:9px 14px;border-radius:9px;border:1px solid var(--line);background:var(--card);cursor:pointer;transition:.15s;font-weight:500}
  .mk-tab:hover{border-color:#b9c6d6}
  .mk-tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .mk-detail{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;box-shadow:var(--shadow)}
  .mk-detail .mk-dom{font-family:var(--mono);color:var(--navy);font-size:14px;font-weight:600}

  .cquiz{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;box-shadow:var(--shadow)}
  .cq-prog{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .cq-q{font-family:var(--disp);font-size:16px;font-weight:600;margin:6px 0 14px}
  .cq-opts{display:flex;flex-direction:column;gap:9px}
  .cq-opt{text-align:left;padding:12px 14px;border-radius:10px;border:1px solid var(--line);background:var(--paper);cursor:pointer;font-size:14px;transition:.15s;font-family:var(--body);color:var(--ink)}
  .cq-opt:hover:not(:disabled){border-color:#b9c6d6}
  .cq-opt.correct{background:rgba(47,179,126,.12);border-color:var(--go);color:#1c7a52;font-weight:600}
  .cq-opt.wrong{background:rgba(232,105,61,.1);border-color:var(--warn);color:#b3461f}
  .cq-opt:disabled{cursor:default}
  .cq-why{margin-top:12px;font-size:13px;color:#33414f;background:var(--paper);border-radius:9px;padding:11px 13px;animation:fade .3s ease}
  .cq-foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px;gap:10px}

  @media (prefers-reduced-motion: reduce){
    .co-hero .plane{animation:none}
    .flip-inner{transition:none}
    .reveal{transition:none}
  }

  /* objection simulator */
  .obj-customer{background:var(--navy);color:#fff;border-radius:14px 14px 14px 4px;padding:15px 16px;font-size:15px;margin:6px 0 16px;max-width:92%;position:relative;line-height:1.5}
  .obj-customer::before{content:"CUSTOMER";position:absolute;top:-9px;left:14px;font-family:var(--mono);font-size:9px;letter-spacing:1px;background:var(--amber);color:var(--navy);padding:1px 7px;border-radius:4px}
  .cq-opt.best{background:rgba(47,179,126,.12);border-color:var(--go);color:#1c7a52;font-weight:600}
  .cq-opt.okk{background:rgba(240,165,0,.12);border-color:var(--amber);color:#8a5b00}
  .cq-opt.avoid{background:rgba(232,105,61,.1);border-color:var(--warn);color:#b3461f}

  /* presenter mode */
  .present-cta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:0 0 18px}
  .present-hint{font-size:12.5px;color:var(--muted);max-width:480px}
  .present-bar{position:fixed;left:0;right:0;bottom:0;z-index:60;background:rgba(10,20,34,.97);backdrop-filter:blur(6px);border-top:2px solid var(--amber);padding:16px 22px;display:flex;align-items:center;gap:18px;box-shadow:0 -8px 30px rgba(0,0,0,.35)}
  .pb-cap{flex:1;color:#fff;font-size:18px;line-height:1.5;font-weight:500;transition:opacity .15s ease;max-width:1000px;margin:0 auto}
  .pb-ctrl{display:flex;align-items:center;gap:8px}
  .pb-ctrl button{width:40px;height:40px;border-radius:9px;border:1px solid #2a3e57;background:#16273c;color:#fff;font-size:16px;cursor:pointer;transition:.15s}
  .pb-ctrl button:hover{border-color:var(--amber)}
  .pb-prog{font-family:var(--mono);font-size:12px;color:var(--amber);min-width:46px;text-align:center}
  .pb-voice{background:#16273c;color:#cdd8e6;border:1px solid #2a3e57;border-radius:8px;font-size:11.5px;padding:7px 6px;max-width:130px;cursor:pointer;font-family:var(--body)}
  .pb-voice:hover{border-color:var(--amber)}
  .pb-text{flex:1;max-width:1000px;margin:0 auto}
  .pb-chapter{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;color:var(--amber);margin-bottom:4px;min-height:14px}

  /* presenter bumper overlay (intro / outro title cards) */
  .present-overlay{position:fixed;inset:0;z-index:70;background:linear-gradient(135deg,#0b1626,#0E1B2C 60%,#10243a);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .5s ease}
  .present-overlay.show{opacity:1}
  .present-overlay .ov-inner{text-align:center;transform:translateY(14px) scale(.98);opacity:0;transition:transform .6s cubic-bezier(.2,.7,.2,1) .1s, opacity .6s ease .1s;max-width:760px;padding:0 30px}
  .present-overlay.show .ov-inner{transform:none;opacity:1}
  .ov-eyebrow{font-family:var(--mono);font-size:13px;letter-spacing:3px;color:var(--amber);margin-bottom:16px}
  .ov-title{font-family:var(--disp);font-size:44px;font-weight:600;color:#fff;line-height:1.1;margin-bottom:14px}
  .ov-sub{font-size:17px;color:#aebccd}
  .ov-host{width:108px;height:108px;margin:0 auto 20px;border-radius:50%;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.4)}
  .present-overlay.speaking .ov-host{animation:hostBob 1s ease-in-out infinite}

  .pb-avatar{width:46px;height:46px;flex-shrink:0;border-radius:50%;overflow:hidden}
  .pb-avatar.speaking{animation:hostBob 1s ease-in-out infinite, hostRing 1.2s ease-out infinite}
  @keyframes hostBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
  @keyframes hostRing{0%{box-shadow:0 0 0 0 rgba(47,179,126,.55)}100%{box-shadow:0 0 0 11px rgba(47,179,126,0)}}
  .host-mouth{transform-origin:32px 31px}
  .speaking .host-mouth{animation:talk .3s ease-in-out infinite alternate}
  @keyframes talk{from{transform:scaleY(1)}to{transform:scaleY(.4)}}
  @media (prefers-reduced-motion: reduce){ .pb-avatar.speaking,.present-overlay.speaking .ov-host,.speaking .host-mouth{animation:none} }

  /* verification — plain-language view */
  .vf-defs{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .vf-def{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;box-shadow:var(--shadow)}
  .vf-def-h{font-family:var(--disp);font-size:15px;font-weight:600;margin-bottom:6px}
  .vf-def p{font-size:13.5px;color:#33414f}
  .vf-sheet{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .vf-sheet-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;box-shadow:var(--shadow)}
  .vf-sheet-when{font-family:var(--disp);font-size:15px;font-weight:600;margin-bottom:10px;padding-bottom:9px;border-bottom:1px solid var(--line)}
  .vf-sheet-card ul{list-style:none;display:flex;flex-direction:column;gap:10px}
  .vf-sheet-card li{font-size:13.5px;color:#33414f;line-height:1.5;padding-left:18px;position:relative}
  .vf-sheet-card li::before{content:"›";position:absolute;left:2px;top:-1px;color:var(--amber);font-weight:700}
  .vf-quote{font-family:var(--mono);background:rgba(47,179,126,.12);color:#1c7a52;padding:1px 6px;border-radius:5px;font-size:12.5px}
  .vf-always-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .vf-always-card{display:flex;gap:11px;align-items:flex-start;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:15px;font-size:13.5px;color:#33414f;line-height:1.5}
  .vf-always-card .ico{font-size:20px;flex-shrink:0}
  @media (max-width:640px){ .vf-defs,.vf-sheet,.vf-always-grid{grid-template-columns:1fr} }

  /* leave helper result */
  .vf-opt.chosen{border-color:var(--navy);background:#fff;font-weight:600}
  .lv-result{margin-top:12px;border-radius:11px;padding:15px 16px;animation:fade .3s ease}
  .lv-result-h{font-family:var(--disp);font-size:15px;font-weight:600;margin-bottom:5px}
  .lv-result p{font-size:13.5px;line-height:1.5}
  .lv-result.good{background:rgba(47,179,126,.1);border:1px solid rgba(47,179,126,.3);color:#1c7a52}
  .lv-result.info{background:rgba(43,90,138,.08);border:1px solid rgba(43,90,138,.25);color:#234b77}
  .lv-result.warn{background:rgba(232,105,61,.1);border:1px solid rgba(232,105,61,.3);color:#b3461f}
  .lv-result.good p,.lv-result.info p,.lv-result.warn p{color:#33414f}

  /* metasearch listing cards */
  .listing-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:13px}
  .listing{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;box-shadow:var(--shadow)}
  .listing.own{border-style:dashed;background:#fbfdff}
  a.listing{text-decoration:none;color:inherit;display:block;transition:.15s}
  a.listing:hover{border-color:var(--navy);transform:translateY(-2px)}

  /* customer Q&A scripts library */
  .sc-tabs{display:flex;gap:7px;flex-wrap:wrap}
  .sc-tab{font-size:12.5px;padding:7px 13px;border-radius:20px;border:1px solid var(--line);background:var(--card);cursor:pointer;transition:.15s;font-family:var(--body)}
  .sc-tab:hover{border-color:#b9c6d6}
  .sc-tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .sc-card{background:var(--card);border:1px solid var(--line);border-radius:11px;margin-bottom:9px;overflow:hidden;box-shadow:var(--shadow)}
  .sc-q{width:100%;display:flex;align-items:center;gap:11px;padding:14px 15px;background:none;border:0;cursor:pointer;text-align:left;font-family:var(--body)}
  .sc-cat{flex-shrink:0;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--navy);background:var(--paper);border:1px solid var(--line);padding:3px 8px;border-radius:5px}
  .sc-qt{flex:1;font-size:14.5px;font-weight:600;color:var(--ink);line-height:1.4}
  .sc-chev{color:var(--muted);transition:transform .2s;flex-shrink:0}
  .sc-card.open .sc-chev{transform:rotate(180deg)}
  .sc-a{max-height:0;overflow:hidden;transition:max-height .35s ease;padding:0 15px}
  .sc-card.open .sc-a{max-height:640px;padding:0 15px 15px}
  .sc-a p{font-size:14px;line-height:1.6;color:#33414f;margin-bottom:10px}
  .sc-tip{font-size:12.5px;color:#5e7186;background:var(--paper);border-radius:8px;padding:10px 12px;line-height:1.5}
  .sc-empty{color:var(--muted);font-size:13.5px;padding:14px}

  /* amadeus: read-the-screen, sandbox, cheat sheet */
  .scrn-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:var(--shadow)}
  .scrn-title{font-family:var(--disp);font-weight:600;font-size:16px;margin-bottom:4px}
  .scrn-intro{font-size:13px;color:var(--muted);margin-bottom:12px}
  .scrn-term{background:#0a1422;color:#37d067;font-family:var(--mono);font-size:12.5px;line-height:1.55;padding:14px 16px;border-radius:10px;overflow-x:auto;white-space:pre;margin:0 0 14px}
  .scrn-q{margin-bottom:14px}
  .scrn-qt{font-size:14px;font-weight:600;margin-bottom:8px}
  .scrn-opts{display:flex;gap:8px;flex-wrap:wrap}
  .scrn-opt{padding:9px 13px;border-radius:9px;border:1px solid var(--line);background:var(--paper);cursor:pointer;font-size:13.5px;font-family:var(--body);transition:.15s;color:var(--ink)}
  .scrn-opt:hover{border-color:var(--navy)}
  .scrn-opt.correct{background:rgba(47,179,126,.15);border-color:var(--go);color:#1c7a52;font-weight:600}
  .scrn-opt.wrong{background:rgba(232,105,61,.12);border-color:var(--warn);color:#b3461f}
  .scrn-opt:disabled{cursor:default}
  .scrn-why{margin-top:8px}
  .sandbox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow)}
  .cheat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:8px}
  .cheat-row{display:flex;gap:10px;align-items:baseline;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:9px 12px}
  .cheat-row code{font-family:var(--mono);font-size:12px;color:var(--navy);background:var(--paper);padding:2px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0}
  .cheat-row span{font-size:12.5px;color:#33414f}

  /* per-lesson demo terminal */
  .lc-demo{margin-top:16px;border-top:1px dashed var(--line);padding-top:16px}
  .lc-demo-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;flex-wrap:wrap}
  .lc-demo-label{font-family:var(--disp);font-size:13px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--navy)}
  .ldemo-screen{background:#0a1422;color:#37d067;font-family:var(--mono);font-size:12.5px;line-height:1.55;padding:14px 16px;border-radius:10px;min-height:120px;max-height:340px;overflow:auto;white-space:pre;margin:0}

  /* module sub-tabs (Learn / Practise / Reference) */
  .subtabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin:6px 0 22px;overflow-x:auto}
  .subtab{appearance:none;border:0;background:none;font-family:var(--body);font-size:14px;font-weight:600;color:var(--muted);padding:11px 18px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:.15s}
  .subtab:hover{color:var(--ink)}
  .subtab.active{color:var(--navy);border-bottom-color:var(--amber)}
  .ampanel{animation:fade .25s ease}
  .lst-name{font-family:var(--disp);font-size:16px;font-weight:600;margin-bottom:7px}
  .lst-markets{font-size:13px;color:#33414f;margin-bottom:10px}
  .lst-tags{display:flex;gap:6px;flex-wrap:wrap}

  /* verification checker */
  .vf-wizard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;box-shadow:var(--shadow);margin-bottom:18px}
  .vf-q{font-family:var(--disp);font-size:17px;font-weight:600;margin:4px 0 14px}
  .vf-opts{display:flex;flex-direction:column;gap:9px}
  .vf-opt{text-align:left;padding:13px 15px;border-radius:10px;border:1px solid var(--line);background:var(--paper);cursor:pointer;font-size:14px;transition:.15s;font-family:var(--body);color:var(--ink)}
  .vf-opt:hover{border-color:var(--navy);background:#fff;transform:translateX(3px)}
  .vf-crumbs{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .vf-crumb{font-size:11.5px;background:var(--navy);color:#fff;padding:3px 10px;border-radius:20px}
  .vf-restart{font-size:11.5px;background:none;border:0;color:var(--muted);cursor:pointer;text-decoration:underline}
  .vf-result-head{font-family:var(--disp);font-size:15px;font-weight:600;margin-bottom:12px}
  .vf-result{display:flex;flex-direction:column;gap:9px}
  .vf-row{display:flex;align-items:flex-start;gap:10px;font-size:14px;color:#33414f;line-height:1.45}
  .vf-pill{flex-shrink:0;font-size:10.5px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;padding:3px 9px;border-radius:6px;margin-top:1px}
  .vf-pill.req{background:rgba(232,105,61,.14);color:#b3461f}
  .vf-pill.opt{background:rgba(240,165,0,.16);color:#8a5b00}
  .vf-pill.no{background:rgba(120,135,150,.14);color:#5e7186}
  .vf-pill.done{background:rgba(47,179,126,.14);color:#1c7a52}
  .vf-note{font-size:13px;color:#33414f;background:var(--paper);border-left:3px solid var(--amber);border-radius:0 8px 8px 0;padding:11px 13px;line-height:1.5}
  .vf-always{margin-top:14px;font-size:13.5px;color:#1c7a52;background:rgba(47,179,126,.08);border:1px solid rgba(47,179,126,.25);border-radius:10px;padding:12px 14px}
  /* ===== Assessment: name, cards, exam, certificate, roleplay ===== */
  .name-row{display:flex;align-items:center;gap:10px;margin:16px 0 4px;flex-wrap:wrap}
  .name-row label{font-size:12px;color:#aebccd;text-transform:uppercase;letter-spacing:.5px}
  .name-row input{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:9px;padding:9px 13px;color:#fff;font-size:14px;min-width:240px;font-family:var(--body)}
  .name-row input::placeholder{color:#7e8ea0}
  .name-row input:focus{outline:0;border-color:var(--amber)}

  .mcard.accent{border-color:rgba(43,90,138,.3)}
  .mcard.accent .mc-num{color:var(--navy)}
  .mcard.locked{opacity:.72}

  /* exam */
  .ex-box{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:26px;box-shadow:var(--shadow);max-width:680px}
  .ex-intro{text-align:center;padding:14px}
  .ex-ico{font-size:40px;margin-bottom:8px}
  .ex-intro h3{font-family:var(--disp);font-size:20px;font-weight:600;margin-bottom:8px}
  .ex-intro p{color:var(--muted);font-size:14px;margin-bottom:18px}
  .ex-bar{height:6px;background:var(--paper);border-radius:4px;overflow:hidden;margin-bottom:16px}
  .ex-bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--navy),var(--go-soft));transition:width .3s}
  .ex-meta{font-size:12.5px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .ex-tag{font-size:10.5px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--navy);background:var(--paper);border:1px solid var(--line);padding:2px 8px;border-radius:5px}
  .ex-q{font-family:var(--disp);font-size:18px;font-weight:600;margin-bottom:16px;line-height:1.4}
  .ex-opts{display:flex;flex-direction:column;gap:10px}
  .ex-opt{text-align:left;padding:14px 16px;border-radius:11px;border:1px solid var(--line);background:var(--paper);cursor:pointer;font-size:14.5px;transition:.15s;font-family:var(--body);color:var(--ink)}
  .ex-opt:hover{border-color:var(--navy);background:#fff;transform:translateX(3px)}
  .ex-result{text-align:center;padding:10px}
  .ex-score{font-family:var(--disp);font-size:54px;font-weight:600;line-height:1}
  .ex-result.pass .ex-score{color:var(--go)}
  .ex-result.fail .ex-score{color:var(--warn)}
  .ex-verdict{font-size:17px;font-weight:600;margin:6px 0 10px}
  .ex-result p{color:#33414f;font-size:14px;max-width:460px;margin:0 auto 14px}
  .ex-review{font-size:13px;color:var(--muted);margin-bottom:16px}
  .ex-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

  /* certificate */
  .cert-locked{text-align:center;padding:40px 20px}
  #certArea{display:flex;justify-content:center}
  .cert{width:100%;max-width:760px;padding:14px;border-radius:16px;background:#0E1B2C;
    background-image:radial-gradient(circle at 18% 0%, rgba(240,165,0,.10), transparent 45%),radial-gradient(circle at 100% 100%, rgba(47,179,126,.07), transparent 45%);
    box-shadow:0 30px 64px rgba(14,27,44,.34)}
  .cert-border{border:2px solid var(--amber);border-radius:11px;padding:46px 44px 32px;text-align:center;position:relative;overflow:hidden;
    background:repeating-radial-gradient(circle at 50% -10%, rgba(255,255,255,.02) 0 1px, transparent 1px 9px), linear-gradient(180deg,#0c1827,#0E1B2C)}
  .cert-border::before{content:"";position:absolute;inset:8px;border:1px solid rgba(240,165,0,.30);border-radius:7px;pointer-events:none}
  .cert-corner{position:absolute;width:22px;height:22px;border:2px solid var(--amber);opacity:.85}
  .cert-corner.tl{top:14px;left:14px;border-right:0;border-bottom:0}
  .cert-corner.tr{top:14px;right:14px;border-left:0;border-bottom:0}
  .cert-corner.bl{bottom:14px;left:14px;border-right:0;border-top:0}
  .cert-corner.br{bottom:14px;right:14px;border-left:0;border-top:0}
  .cert-seal{width:76px;height:76px;border-radius:50%;margin:0 auto 16px;position:relative;display:grid;place-items:center;
    background:radial-gradient(circle,#ffd674,#F0A500);color:var(--navy);font-size:30px;
    box-shadow:0 6px 18px rgba(240,165,0,.45), inset 0 0 0 3px rgba(255,255,255,.4), inset 0 0 0 7px rgba(240,165,0,.55)}
  .cert-seal::after{content:"";position:absolute;inset:-7px;border-radius:50%;border:1.5px dashed rgba(240,165,0,.5)}
  .cert-brand{font-family:var(--disp);font-size:24px;font-weight:700;color:#fff;letter-spacing:5px}
  .cert-sub{color:var(--amber);font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px}
  .cert-title{font-family:var(--disp);font-size:12.5px;letter-spacing:4px;text-transform:uppercase;color:#9fb0c2;margin:20px 0 6px}
  .cert-line{color:#aebccd;font-size:13.5px;max-width:540px;margin:0 auto;line-height:1.6}
  .cert-name{font-family:var(--disp);font-size:38px;font-weight:600;color:#fff;margin:12px auto 10px;padding:0 26px 12px;border-bottom:1px solid rgba(240,165,0,.4);display:inline-block;min-width:300px;letter-spacing:.5px}
  .cert-meta{display:flex;justify-content:center;gap:44px;margin:24px 0;flex-wrap:wrap}
  .cert-meta .cm-v{font-family:var(--disp);font-size:17px;font-weight:600;color:var(--amber)}
  .cert-meta .cm-l{font-size:10px;color:#8fa0b3;text-transform:uppercase;letter-spacing:.6px;margin-top:3px}
  .cert-signs{display:flex;justify-content:space-around;gap:30px;margin-top:22px;flex-wrap:wrap}
  .cert-sign-col{flex:1;min-width:170px;max-width:240px}
  .cert-sign-name{font-family:var(--disp);font-size:14px;color:#fff;min-height:22px;border-bottom:1px solid rgba(255,255,255,.28);padding-bottom:7px;margin-bottom:7px}
  .cert-sign-role{font-size:10px;color:#8fa0b3;text-transform:uppercase;letter-spacing:.8px}
  .cert-verify{margin-top:22px;font-family:var(--mono);font-size:10.5px;color:#6f8197;letter-spacing:.5px}

  /* roleplay */
  .rp-meter-wrap{display:flex;align-items:center;gap:12px;margin-bottom:16px;max-width:520px}
  .rp-meter-l{font-size:12px;color:var(--muted);white-space:nowrap}
  .rp-meter{flex:1;height:9px;background:var(--line);border-radius:5px;overflow:hidden}
  .rp-meter > i{display:block;height:100%;border-radius:5px;transition:width .4s ease,background .4s}
  .rp-meter > i.good{background:var(--go)} .rp-meter > i.mid{background:var(--amber)} .rp-meter > i.low{background:var(--warn)}
  .rp-stage{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;box-shadow:var(--shadow)}
  .rp-cust{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px}
  .rp-avatar{width:42px;height:42px;border-radius:50%;background:var(--paper);border:1px solid var(--line);display:grid;place-items:center;font-size:20px;flex-shrink:0}
  .rp-avatar.you{background:var(--navy);border-color:var(--navy)}
  .rp-bubble{background:var(--paper);border:1px solid var(--line);border-radius:4px 14px 14px 14px;padding:14px 16px;font-size:15px;line-height:1.5;color:var(--ink)}
  .rp-choices{display:flex;flex-direction:column;gap:10px}
  .rp-choice{text-align:left;padding:13px 15px;border-radius:11px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:14px;line-height:1.45;transition:.15s;font-family:var(--body);color:var(--ink)}
  .rp-choice:hover{border-color:var(--navy);transform:translateX(3px)}
  .rp-you{display:flex;gap:12px;align-items:flex-start;justify-content:flex-end;margin:14px 0}
  .rp-you-bubble{border-radius:14px 4px 14px 14px;padding:13px 15px;font-size:14px;line-height:1.5;max-width:80%}
  .rp-you-bubble.good{background:rgba(47,179,126,.12);border:1px solid var(--go);color:#1c7a52}
  .rp-you-bubble.okk{background:rgba(240,165,0,.12);border:1px solid var(--amber);color:#8a5b00}
  .rp-you-bubble.avoid{background:rgba(232,105,61,.1);border:1px solid var(--warn);color:#b3461f}
  .rp-fb{font-size:13px;color:#33414f;background:var(--paper);border-radius:9px;padding:11px 13px;line-height:1.5;margin-bottom:14px}
  .rp-fb-tag{font-family:var(--mono);font-size:10px;letter-spacing:1px;padding:2px 7px;border-radius:5px;margin-right:6px;font-weight:600}
  .rp-fb-tag.good{background:rgba(47,179,126,.16);color:#1c7a52}
  .rp-fb-tag.okk{background:rgba(240,165,0,.18);color:#8a5b00}
  .rp-fb-tag.avoid{background:rgba(232,105,61,.14);color:#b3461f}
  .rp-end{text-align:center;padding:14px}
  .rp-end-emoji{font-size:44px;margin-bottom:8px}
  .rp-end h3{font-family:var(--disp);font-size:21px;font-weight:600;margin-bottom:8px}
  .rp-end p{color:#33414f;font-size:14.5px;max-width:500px;margin:0 auto 14px;line-height:1.6}
  .rp-end-stat{font-size:13px;color:var(--muted);margin-bottom:18px}
  .rp-end.good h3{color:var(--go)} .rp-end.bad h3{color:var(--warn)}

  @media print{
    body * { visibility:hidden !important; }
    #certArea, #certArea * { visibility:visible !important; }
    #certArea{position:absolute;left:0;top:0;width:100%;}
    .cert{max-width:100%;}
  }
  .trainer-link{display:inline-block;margin-top:8px;font-size:12px;color:var(--amber);text-decoration:none;opacity:.85}
  .trainer-link:hover{opacity:1;text-decoration:underline}
  .admin-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin:8px 0 20px}
  .admin-stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .admin-stat .n{font-family:var(--disp);font-size:24px;font-weight:600;color:var(--navy)}
  .admin-stat .n.live{font-size:15px;color:var(--go)}
  .admin-stat .l{font-size:12px;color:var(--muted);margin-top:2px}
  .admin-tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px;background:#fff}
  .admin-table{width:100%;border-collapse:collapse;font-size:13.5px}
  .admin-table th{text-align:left;padding:11px 14px;background:#f4f6f9;color:#5a6b7d;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--line)}
  .admin-table td{padding:11px 14px;border-bottom:1px solid var(--line)}
  .admin-table tr:last-child td{border-bottom:none}
  .admin-table td.muted{color:var(--muted);font-size:12.5px}
  .abadge{display:inline-block;font-size:11px;font-family:var(--mono);padding:2px 9px;border-radius:20px;background:#eef1f5;color:#5a6b7d;border:1px solid var(--line)}
  .abadge.pass{background:rgba(47,179,126,.12);color:#1c7a52;border-color:rgba(47,179,126,.35)}
  .pb-track{height:4px;background:rgba(255,255,255,.16);border-radius:3px;margin-top:9px;overflow:hidden}
  .pb-track i{display:block;height:100%;width:0;background:var(--amber);border-radius:3px;transition:width .45s ease}
  .present-focus{outline:3px solid var(--amber);outline-offset:6px;border-radius:14px;box-shadow:0 0 0 7px rgba(240,165,0,.16);scroll-margin:130px;transition:outline-color .3s ease, box-shadow .3s ease}
  @media (prefers-reduced-motion: reduce){ .pb-track i{transition:none} .present-focus{transition:none} }
  .btn-present{background:linear-gradient(135deg,#F0A500,#ffc24d);color:#0E1B2C;font-weight:700;border:none;padding:12px 22px;font-size:14.5px;border-radius:10px;box-shadow:0 3px 14px rgba(240,165,0,.42);letter-spacing:.2px;transition:.15s}
  .btn-present:hover{filter:brightness(1.04);transform:translateY(-1px);box-shadow:0 5px 18px rgba(240,165,0,.5)}
  .present-cta{background:rgba(240,165,0,.06);border:1px dashed rgba(240,165,0,.4);border-radius:12px;padding:14px 16px}
  .gate-intro{background:#fff;border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:12px;padding:16px 18px}
  .gate-intro p{margin:0 0 12px;font-size:14px;line-height:1.55}
  .gate-result{text-align:center;background:#fff;border:1px solid var(--line);border-radius:14px;padding:26px 20px}
  .gate-result.pass{border-color:rgba(47,179,126,.4);background:rgba(47,179,126,.05)}
  .gate-result.fail{border-color:rgba(232,105,61,.35);background:rgba(232,105,61,.05)}
  .gr-score{font-family:var(--disp);font-size:40px;font-weight:700;color:var(--navy)}
  .gate-result h4{margin:6px 0 4px;font-size:18px}
  .gate-result p{color:var(--muted);font-size:13.5px;margin:0 0 14px}
  .gate-result .btn{margin:4px}
  .iax-code{font-family:var(--mono);font-weight:600;font-size:46px;letter-spacing:5px;color:#fff;background:#0a1422;border:1px solid #1d2c41;border-radius:14px;padding:18px 10px;text-align:center;box-shadow:inset 0 0 0 1px rgba(240,165,0,.14);margin:6px 0 4px}
  .iax-step{font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin:16px 0 8px;font-weight:600}
  .iax-say{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .iax-reveal{margin-top:14px;padding:13px 15px;border-radius:10px;font-size:14px}
  .iax-reveal.ok{background:rgba(47,179,126,.1);color:#1c7a52}
  .iax-reveal.no{background:rgba(232,105,61,.1);color:#b3461f}
  .ex-locked{text-align:center;background:#fff;border:1px solid var(--line);border-radius:14px;padding:40px 24px}
  .ex-locked .ex-ico{font-size:40px}
  .ex-opt.correct{background:rgba(47,179,126,.15);border-color:var(--go);color:#1c7a52;font-weight:600}
  .ex-opt.wrong{background:rgba(232,105,61,.12);border-color:#e8693d;color:#b3461f}
  @keyframes cardin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .grid .mcard{animation:cardin .4s cubic-bezier(.2,.7,.3,1) backwards}
  .grid .mcard:nth-child(2){animation-delay:.05s}
  .grid .mcard:nth-child(3){animation-delay:.1s}
  .grid .mcard:nth-child(4){animation-delay:.15s}
  .grid .mcard:nth-child(5){animation-delay:.2s}
  .grid .mcard:nth-child(6){animation-delay:.25s}
  .grid .mcard:nth-child(7){animation-delay:.3s}
  @media (prefers-reduced-motion: reduce){ .grid .mcard{animation:none} }
  /* learning objectives banner */
  .mod-goals{background:linear-gradient(180deg,#fbfdff,#f3f7fb);border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:12px;padding:15px 18px;margin:0 0 22px}
  .mod-goals .mg-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:9px;flex-wrap:wrap}
  .mg-eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:1.6px;text-transform:uppercase;color:#8a5b00}
  .mg-time{font-size:12px;color:var(--muted);font-weight:600}
  .mg-list{list-style:none;display:grid;gap:6px}
  .mg-list li{position:relative;padding-left:24px;font-size:13.5px;color:#33414f}
  .mg-list li::before{content:"✓";position:absolute;left:0;top:0;color:var(--go);font-weight:700}
  /* glossary */

<script>
/* ============================================================
   CTD ACADEMY — prototype data + logic
   ============================================================ */

/* ---- Module registry (drives nav + dashboard) ---- */
const MODULES = [
  {id:"company",  num:"01", ico:"🏢", title:"Welcome to CTD",        desc:"Who we are, our mission, and how the agency is structured.", mins:15, goals:["Explain what CTD does and the markets we serve","Know our phone lines and Spanish-language site","Describe how a booking moves from quote to support"]},

function loadStore(){ try{ const r=localStorage.getItem(STORE_KEY); return r?JSON.parse(r):{}; }catch(e){ return _mem; } }
function saveStore(o){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(o)); }catch(e){ _mem=o; } }

let agentName = _saved.name || '';
let examBest = _saved.examBest || 0;

function genId(){ try{ return crypto.randomUUID(); }catch(e){ return 'a'+Date.now().toString(36)+Math.random().toString(36).slice(2,8); } }
let agentId = _saved.agentId || genId();
let examSession = _saved.examSession || null;
let iaxSession = _saved.iaxSession || null;
function persist(){ saveStore({progress, name:agentName, examBest, examPassed, agentId, examSession, iaxSession}); syncAgent(); }
function initials(n){ n=(n||'').trim(); if(!n) return 'NA'; const p=n.split(/\s+/); return ((p[0][0]||'')+(p[1]?p[1][0]:'')).toUpperCase(); }
function setName(v){ agentName=v; persist(); refreshIdentity(); }
function refreshIdentity(){
  const av=document.getElementById('avatar'); if(av) av.textContent=initials(agentName);

const SUPABASE_URL = "https://hplnchoruykuoeqgpsps.supabase.co";
const SUPABASE_KEY = "sb_publishable_a1SUWOHIKNF7ckME30MO3w_BpBL_qt1"; // publishable key — safe in the browser with RLS on
const ADMIN_PASSCODE = "CTD-Trainer-2026"; // trainers type this to open the dashboard

let _sb;
function getSB(){
  if(_sb!==undefined) return _sb;
  _sb = (SUPABASE_URL && SUPABASE_KEY && window.supabase)
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;
  return _sb;
}
let _syncT=null;
function syncAgent(){
  const sb=getSB(); if(!sb) return;
  clearTimeout(_syncT);
  _syncT=setTimeout(async ()=>{
    try{
      const done = MODULES.filter(m=>progress[m.id]>=100).length;
      await sb.from('ctd_progress').upsert({
        agent_id: agentId,
        agent_name: agentName || 'New Agent',
        modules_done: done,
        modules_total: MODULES.length,
        exam_best: examBest,
        exam_passed: examPassed,
        progress,
        updated_at: new Date().toISOString()
      }, { onConflict:'agent_id' });
    }catch(e){ /* offline — will resync on next change */ }
  }, 700);
}

/* ---- Company module interactivity ---- */
function initCompany(){
  const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  // count-up stats
  document.querySelectorAll('.co-view .countup').forEach(el=>{
    const target = +el.dataset.target, suf = el.dataset.suffix||'';
    if(reduce){ el.textContent = target+suf; return; }
    const dur = 1100, start = performance.now();
    const tick = now =>{ const p = Math.min((now-start)/dur,1); el.textContent = Math.round(p*target)+suf; if(p<1) requestAnimationFrame(tick); };
    requestAnimationFrame(tick);
  });
  // reveal-on-load (staggered)
  document.querySelectorAll('.co-view .reveal').forEach((el,i)=> setTimeout(()=>el.classList.add('in'), reduce?0:90*i));
  // journey
  coJourney(0);
  document.querySelectorAll('#cjTrack .cj-node').forEach(n=> n.onclick = ()=>{ if(cjTimer){clearInterval(cjTimer);cjTimer=null;} coJourney(+n.dataset.i); });
  const play = document.getElementById('cjPlay'); if(play) play.onclick = coPlay;
  // markets
  coMarket(0);
  document.querySelectorAll('#mkTabs .mk-tab').forEach(t=> t.onclick = ()=>coMarket(+t.dataset.i));
  // quiz
  coQuiz();
  // presenter mode
  warmVoices();
  const pbtn = document.getElementById('presentBtn'); if(pbtn) pbtn.onclick = presentCompany;
}

function warmVoices(){ try{ if('speechSynthesis' in window){ window.speechSynthesis.getVoices(); window.speechSynthesis.onvoiceschanged = populateVoicePicker; populateVoicePicker(); } }catch(e){} }
function listEnglishVoices(){
  try{ return (window.speechSynthesis.getVoices()||[]).filter(v=>/^en/i.test(v.lang)); }catch(e){ return []; }
}
function isMaleName(n){ return /(daniel|alex|david|guy|davis|arthur|james|george|ryan|eric|brian|tom|fred|aaron|rishi|oliver|thomas|male|\bman\b)/i.test(n); }
function bestMaleVoice(){
  const en = listEnglishVoices();
  return en.find(v=>/google uk english male/i.test(v.name))
      || en.find(v=>/(daniel|alex|david|guy|davis|arthur|james|george|oliver)/i.test(v.name))
      || en.find(v=>isMaleName(v.name))
      || en.find(v=>/en[-_]GB/i.test(v.lang))
      || en[0] || null;
}
function pickVoice(){
  const en = listEnglishVoices();
  if(chosenVoiceName){ const m = en.find(v=>v.name===chosenVoiceName); if(m) return m; }
  return bestMaleVoice();
}
function populateVoicePicker(){
  const sel = document.getElementById('pbVoice'); if(!sel) return;
  const en = listEnglishVoices(); if(!en.length) return;
  if(!chosenVoiceName){ const b = bestMaleVoice(); if(b) chosenVoiceName = b.name; }
  sel.innerHTML = en.map(v=>{
    const label = v.name.replace(/google /i,'').replace(/microsoft /i,'') + (isMaleName(v.name)?' ♂':'');
    return `<option value="${v.name.replace(/"/g,'')}" ${v.name===chosenVoiceName?'selected':''}>${label}</option>`;
  }).join('');
  sel.onchange = ()=>{ chosenVoiceName = sel.value; try{ window.speechSynthesis.cancel(); }catch(e){} };
}
function speakBeat(text){
  return new Promise(resolve=>{
    if(presentMuted || !('speechSynthesis' in window)){ resolve(); return; }
    try{
      window.speechSynthesis.cancel();
      const clean = (text||'').replace(/[^\x20-\x7E]/g,' ').replace(/\s+/g,' ').trim();
      if(!clean){ resolve(); return; }
      const u = new SpeechSynthesisUtterance(clean);
      u.rate=0.9; u.pitch=0.82; u.volume=1;        // slower + deeper = more mature, less robotic
      const v = pickVoice(); if(v) u.voice=v;
      u.onend=()=>resolve(); u.onerror=()=>resolve();
      window.speechSynthesis.speak(u);
    }catch(e){ resolve(); }
  });
}
function setSpeaking(on){ const a=document.getElementById('pbAvatar'); if(a) a.classList.toggle('speaking', !!on); }
function playAudio(url){
  return new Promise(resolve=>{
    let done=false, a;
    const finish=r=>{ if(done) return; done=true; clearInterval(iv); if(currentAudio===a) currentAudio=null; resolve(r); };
    try{ a=new Audio(url); }catch(e){ resolve('error'); return; }
    currentAudio=a;
    a.onended=()=>finish('ended');
    a.onerror=()=>finish('error');
    const iv=setInterval(()=>{ if(presentCancel||presentInterrupt){ try{a.pause();}catch(e){} finish('cancel'); } }, 150);
    a.play().catch(()=>finish('error'));
  });
}
// Narrate one section: ElevenLabs clip if AUDIO_BASE is set, else browser voice, else silent wait.
async function narrate(file, text, dur){
  if(presentMuted){ await pWait(dur); return; }
  setSpeaking(true);
  if(AUDIO_BASE && file){
    const r = await Promise.race([ playAudio(AUDIO_BASE+file), pWait(dur+20000) ]);
    if(r==='error' && 'speechSynthesis' in window){ await Promise.race([ speakBeat(text), pWait(dur+12000) ]); }
  } else if('speechSynthesis' in window){
    await Promise.race([ speakBeat(text), pWait(dur+12000) ]);
  } else {
    await pWait(dur);
  }
  setSpeaking(false);
  await pWait(500);
}
function audioFileFor(i){ return `${curPrefix}-${String(i).padStart(2,'0')}.mp3`; }
function pWait(ms){
  return new Promise(resolve=>{
    let elapsed=0; const step=100;
    const iv=setInterval(()=>{
      if(presentCancel||presentInterrupt){ clearInterval(iv); resolve(); return; }
      if(presentPaused) return;
      elapsed+=step;
      if(elapsed>=ms){ clearInterval(iv); resolve(); }
    }, step);
  });
}
function startPresent(){
  if(presentRun) return;
  presentRun=true; presentCancel=false; presentPaused=false; presentInterrupt=false;
  const bar=document.getElementById('presentBar'); if(bar) bar.style.display='flex';
  const tg=document.getElementById('pbToggle'); if(tg){ tg.textContent='⏸'; tg.onclick=togglePresent; }
  const mt=document.getElementById('pbMute'); if(mt){ mt.textContent= presentMuted?'🔇':'🔊'; mt.onclick=toggleMute; }
  const ps=document.getElementById('pbStop'); if(ps) ps.onclick=stopPresent;
  const pv=document.getElementById('pbPrev'); if(pv) pv.onclick=prevBeat;
  const nx=document.getElementById('pbNext'); if(nx) nx.onclick=nextBeat;
  const rp=document.getElementById('pbReplay'); if(rp) rp.onclick=replayBeat;
  presentKeyH=(e)=>{
    const tag=(e.target&&e.target.tagName||'').toLowerCase();
    if(tag==='input'||tag==='textarea'||tag==='select') return;
    if(e.key===' '||e.code==='Space'){ e.preventDefault(); togglePresent(); }
    else if(e.key==='ArrowRight'){ e.preventDefault(); nextBeat(); }
    else if(e.key==='ArrowLeft'){ e.preventDefault(); prevBeat(); }
    else if(e.key==='Escape'){ e.preventDefault(); stopPresent(); }
    else if(e.key==='m'||e.key==='M'){ toggleMute(); }
  };
  document.addEventListener('keydown', presentKeyH);
  populateVoicePicker();
  runPresent();
}
function toggleMute(){
  presentMuted=!presentMuted;
  const mt=document.getElementById('pbMute'); if(mt) mt.textContent= presentMuted?'🔇':'🔊';
  if(presentMuted){ try{ window.speechSynthesis.cancel(); }catch(e){} if(currentAudio){ try{currentAudio.pause();}catch(e){} currentAudio=null; } setSpeaking(false); }
}
function togglePresent(){
  presentPaused=!presentPaused;
  const tg=document.getElementById('pbToggle'); if(tg) tg.textContent = presentPaused?'▶':'⏸';
  try{ presentPaused ? window.speechSynthesis.pause() : window.speechSynthesis.resume(); }catch(e){}
  if(currentAudio){ try{ presentPaused ? currentAudio.pause() : currentAudio.play(); }catch(e){} }
}
function stopPresent(){
  presentCancel=true; presentRun=false; presentPaused=false; presentInterrupt=false;
  try{ window.speechSynthesis.cancel(); }catch(e){}
  if(currentAudio){ try{currentAudio.pause();}catch(e){} currentAudio=null; }
  setSpeaking(false); clearFocus();
  if(presentKeyH){ document.removeEventListener('keydown', presentKeyH); presentKeyH=null; }
  const bar=document.getElementById('presentBar'); if(bar) bar.style.display='none';
  const ov=document.getElementById('presentOverlay'); if(ov){ ov.classList.remove('show','speaking'); ov.style.display='none'; }
}
function showBumper(eyebrow, title, sub, ms, file){
  return new Promise(async resolve=>{
    const ov=document.getElementById('presentOverlay');
    if(!ov || presentCancel){ resolve(); return; }
    ov.querySelector('.ov-eyebrow').textContent = eyebrow||'';
    ov.querySelector('.ov-title').textContent = title||'';
    ov.querySelector('.ov-sub').textContent = sub||'';
    ov.style.display='flex';
    requestAnimationFrame(()=> ov.classList.add('show'));
    if(presentMuted){
      await pWait(ms);
    } else {
      ov.classList.add('speaking');
      if(AUDIO_BASE && file){
        const r = await Promise.race([ playAudio(AUDIO_BASE+file), pWait(ms+20000) ]);
        if(r==='error' && 'speechSynthesis' in window){ await Promise.race([ speakBeat((title||'')+'. '+(sub||'')), pWait(ms+6000) ]); }
      } else if('speechSynthesis' in window){
        await Promise.race([ speakBeat((title||'')+'. '+(sub||'')), pWait(ms+6000) ]);
      } else {
        await pWait(ms);
      }
      ov.classList.remove('speaking');
      await pWait(400);
    }
    if(presentCancel){ resolve(); return; }
    ov.classList.remove('show');
    await pWait(500);
    ov.style.display='none';
    resolve();
  });
}
function setFocusEl(el){
  if(lastFocusEl && lastFocusEl!==el) lastFocusEl.classList.remove('present-focus');
  if(el) el.classList.add('present-focus');
  lastFocusEl=el;
}
function clearFocus(){ if(lastFocusEl){ lastFocusEl.classList.remove('present-focus'); lastFocusEl=null; } }
function updateProg(i){
  const prog=document.getElementById('pbProg'); if(prog) prog.textContent=`${i+1} / ${curBeats.length}`;
  const fill=document.getElementById('pbFill'); if(fill) fill.style.width=(((i+1)/curBeats.length)*100)+'%';
}
async function playBeat(i){
  presentInterrupt=false;
  const b=curBeats[i];
  updateProg(i);
  const ch=document.getElementById('pbChapter'); if(ch) ch.textContent=b.chapter||'';
  if(b.tab && typeof window.__subTab==='function') window.__subTab(b.tab, true);
  const el=document.querySelector(b.sel);
  if(el){ el.scrollIntoView({behavior:'smooth', block:'center'}); setFocusEl(el); }
  await pWait(800); if(presentCancel||presentInterrupt) return;
  const cap=document.getElementById('pbCap'); if(cap){ cap.style.opacity=0; setTimeout(()=>{ cap.textContent=b.cap; cap.style.opacity=1; }, 150); }
  if(b.action){ try{ b.action(); }catch(e){} }
  await narrate(audioFileFor(i), b.cap, b.dur);
}
async function runPresent(){
  await showBumper(curIntro.eyebrow, curIntro.title, curIntro.sub, 3200, curPrefix+'-intro.mp3');
  if(presentCancel){ presentRun=false; return; }
  pIndex=0; pJump=null;
  while(pIndex < curBeats.length){
    if(presentCancel) break;
    await playBeat(pIndex);
    if(presentCancel) break;
    if(pJump!==null){
      const t=pJump; pJump=null;
      if(t>=curBeats.length) break;          // "next" past the last section ends the show
      pIndex = Math.max(0, t);
      continue;
    }
    pIndex++;
  }
  if(!presentCancel){
    clearFocus();
    const bar=document.getElementById('presentBar'); if(bar) bar.style.display='none';
    await showBumper(curOutro.eyebrow, curOutro.title, curOutro.sub, 3600, curPrefix+'-outro.mp3');
    stopPresent();
  }
  presentRun=false;
}
function gotoBeat(t){
  if(!presentRun) return;
  if(presentPaused) togglePresent();          // resume so it keeps playing from the new spot
  pJump=t; presentInterrupt=true;
  try{ window.speechSynthesis.cancel(); }catch(e){}
  if(currentAudio){ try{currentAudio.pause();}catch(e){} currentAudio=null; }
}
function nextBeat(){ gotoBeat((pJump!==null?pJump:pIndex)+1); }
function prevBeat(){ gotoBeat((pJump!==null?pJump:pIndex)-1); }
function replayBeat(){ gotoBeat(pIndex); }

}

    ]},

    options:[
      {t:"Explain we have partnerships with travel suppliers who give us negotiated fares that aren't on the airline's own website, so we pass the savings on.", v:"best", why:"The approved one-line answer — clear, honest, and reassuring. Know it cold."},
      {t:"Say it's a limited-time glitch they should grab fast.", v:"avoid", why:"Untrue and manipulative. Never invent a reason that pressures them."},

      <div class="pb-col"><h4>🛡️ Travel insurance</h4><p>A <b>separate third-party policy</b> that reimburses you for <i>covered</i> reasons (illness, emergencies) within its terms. It does <b>not</b> make the ticket refundable, and it pays out per the policy — not automatically.</p></div>

    <p style="font-size:13.5px;color:var(--muted);margin:0 0 10px">Sometimes a customer sees a lower price elsewhere that isn't really bookable — a teaser ("bait-and-switch") that jumps once they call. Handle it fairly:</p>

    <h3 class="sec" id="pbReviews">Asking for reviews — Google, Trustpilot &amp; Better Business Bureau</h3>
    <div class="note"><span>⭐</span><div><b>Why this matters.</b> Honest reviews from happy customers help other travellers find and trust us — Google reviews lift how easily we're found in search, Trustpilot and the Better Business Bureau build confidence for US customers deciding whether to book. The best time to ask is the moment a customer is clearly happy, before you hang up.</div></div>

      <li><b>Send the direct link there and then.</b> People want to help but won't go hunting — text or email the exact review link while you're still on the call.</li>
      <li><b>Ask once, and thank them either way.</b> Never nag, and never make booking feel conditional on a review.</li>
    </ul>
    <div class="sx"><div class="sx-h">Ask right after the win</div>"I'm really glad we got that sorted for you, [Name]. If you have a quick minute, it would genuinely help our team if you'd share your experience — I can send you the link for Google, Trustpilot, or the Better Business Bureau, whichever's easiest. No pressure at all."</div>
    <div class="sx"><div class="sx-h">Make it effortless</div>"Would it be okay if I text or email you our Google review link? It takes about a minute, and honest feedback really helps a small team like ours."</div>
    <div class="sx"><div class="sx-h">Make it specific</div>"If today was worth it — finding that [route] fare and getting it booked — a short note about what stood out would mean a lot. You can leave it on Google or the Better Business Bureau, whichever you use."</div>
    <div class="pb-mini"><b>Links to send —</b> Google: [paste Google review link] &nbsp;|&nbsp; Trustpilot: [paste Trustpilot link] &nbsp;|&nbsp; Better Business Bureau: [paste Better Business Bureau review link]</div>
    <div class="pitfall"><h4>⚠️ Keep reviews genuine — the rules are strict</h4><ul>
      <li><b>Never pay, discount or reward the customer</b> for leaving a review, and never write, pre-fill or coach what they should say.</li>
      <li><b>Don't ask only happy customers to leave 5 stars</b> or screen out unhappy ones — just invite an honest review.</li>
      <li>Google and the Better Business Bureau actively flag or remove incentivised and fake reviews, and the <b>US FTC's fake-review rule</b> applies to our American customers. A genuine invitation is always fine; anything beyond that puts our whole profile — and the business — at risk.</li>
    </ul></div>
  </div>

  ${presenterMarkup()}
  <div class="pitfall"><h4>⚠️ Common mistakes to avoid</h4><ul><li><b>Inventing urgency.</b> Never say a price will vanish in minutes or call it a "glitch" to rush a decision. Real reassurance closes; fake pressure loses trust.</li><li><b>Running down competitors.</b> It sounds defensive. Sell what <i>we</i> do well instead.</li><li><b>Quoting only the lowest number.</b> Price alone invites comparison shopping — pair it with service, support and the change window.</li><li><b>Talking over the objection.</b> Hear the real concern first, then answer it. A rushed answer to the wrong worry doesn't land.</li></ul></div>

  </div>`;
